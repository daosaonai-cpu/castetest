<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom Select Arrow Styling */
        .custom-select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%239ca3af%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px 16px;
        }
    </style>
</head>
<body class="bg-[#F8F9FB] text-gray-800 h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-[260px] bg-[#131B2A] text-white flex flex-col transition-all duration-300 ease-in-out shrink-0 z-20 relative">
        <div class="h-20 flex items-center justify-between px-6 border-b border-gray-800">
            <div id="logo-container" class="flex items-center gap-3 overflow-hidden">
                <div class="relative flex items-center justify-center w-8 h-8 rounded-full bg-blue-500 shrink-0">
                    <i data-lucide="pie-chart" class="w-[18px] h-[18px] text-white"></i>
                </div>
                <span id="brand-name" class="text-xl font-bold tracking-wide whitespace-nowrap">Trackbit</span>
            </div>
            <button id="collapse-btn" class="p-1 rounded-full border border-gray-600 hover:bg-gray-800 text-gray-400 transition-colors">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
            </button>
        </div>

        <nav class="flex-1 py-6 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 transition-colors group">
                <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0 group-hover:text-white"></i>
                <span class="sidebar-text font-medium whitespace-nowrap">Dashboard</span>
            </a>

            <a href="#" id="nav-add-task" class="nav-link flex items-center gap-3 px-3 py-3 rounded-xl bg-white text-gray-900 shadow-sm transition-colors group">
                <i data-lucide="plus-circle" class="w-5 h-5 shrink-0 text-gray-900"></i>
                <span class="sidebar-text font-semibold whitespace-nowrap">Add New Task</span>
            </a>

            <a href="#" id="nav-task-list" class="nav-link flex items-center gap-3 px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 transition-colors group">
                <i data-lucide="list" class="w-5 h-5 shrink-0 group-hover:text-white"></i>
                <span class="sidebar-text font-medium whitespace-nowrap">Tasks List</span>
            </a>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <a href="#" class="flex items-center gap-3 px-3 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 transition-colors group">
                <i data-lucide="log-out" class="w-5 h-5 shrink-0 group-hover:text-white"></i>
                <span class="sidebar-text font-medium whitespace-nowrap">Logout</span>
            </a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-4">
                <button id="expand-btn" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 hidden">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h1 id="page-title" class="text-xl font-semibold text-gray-900">Add New Task</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="relative hidden md:block">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-[18px] h-[18px]"></i>
                    <input 
                        type="text" 
                        placeholder="Search..." 
                        class="pl-10 pr-4 py-2 w-64 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all"
                    />
                </div>
                <button class="text-gray-500 hover:text-gray-700 relative">
                    <i data-lucide="bell" class="w-[22px] h-[22px]"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border border-indigo-200 cursor-pointer">
                    JD
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            
            <div id="view-add-task" class="max-w-5xl mx-auto bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] p-8 md:p-10 block">
                <h2 class="text-2xl font-bold text-gray-900 mb-8">Create New Task</h2>
                
                <form id="task-form" class="space-y-6">
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">Time Slot (From)</label>
                            <div class="relative">
                                <input 
                                    type="time" 
                                    id="time-from"
                                    required
                                    class="w-full pl-4 pr-10 py-2.5 bg-white border border-gray-200 rounded-lg text-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow"
                                />
                                <i data-lucide="clock" class="w-[18px] h-[18px] absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">Time Slot (To)</label>
                            <div class="relative">
                                <input 
                                    type="time" 
                                    id="time-to"
                                    required
                                    class="w-full pl-4 pr-10 py-2.5 bg-white border border-gray-200 rounded-lg text-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow"
                                />
                                <i data-lucide="clock" class="w-[18px] h-[18px] absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">Activity Category</label>
                            <select id="task-category" required class="custom-select w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-gray-700 text-sm appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow cursor-pointer">
                                <option value="" disabled selected>Select category</option>
                                <option value="Development">Development</option>
                                <option value="Design">Design</option>
                                <option value="Meeting">Meeting</option>
                                <option value="Planning">Planning</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700">Outcome / Achievement</label>
                        <textarea 
                            id="task-outcome"
                            rows="4"
                            required
                            placeholder="What was achieved?"
                            class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg text-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow resize-y"
                        ></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-gray-700">Remarks</label>
                        <textarea 
                            id="task-remarks"
                            rows="3"
                            placeholder="Any additional remarks..."
                            class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg text-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow resize-y"
                        ></textarea>
                    </div>

                    <div class="pt-6 flex justify-end">
                        <button 
                            type="submit"
                            class="flex items-center gap-2 px-8 py-3 bg-[#6C5DD3] hover:bg-[#5a4bc0] text-white font-medium rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#6C5DD3]"
                        >
                            <i data-lucide="save" class="w-[18px] h-[18px]"></i>
                            <span>Save Task</span>
                        </button>
                    </div>

                </form>
            </div>

            <div id="view-task-list" class="max-w-6xl mx-auto hidden">
                <div class="bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] overflow-hidden">
                    <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-white">
                        <h2 class="text-xl font-bold text-gray-900">Your Tasks</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200 text-sm font-medium text-gray-500 uppercase tracking-wider">
                                    <th class="px-6 py-4">Time</th>
                                    <th class="px-6 py-4">Category</th>
                                    <th class="px-6 py-4">Outcome</th>
                                    <th class="px-6 py-4">Remarks</th>
                                </tr>
                            </thead>
                            <tbody id="task-table-body" class="divide-y divide-gray-200 text-sm text-gray-700 bg-white">
                                <tr>
                                    <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                                        No tasks added yet. Create a new task to see it here!
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // ---- Sidebar Toggle Logic ----
        const sidebar = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapse-btn');
        const expandBtn = document.getElementById('expand-btn');
        const sidebarTexts = document.querySelectorAll('.sidebar-text');
        const brandName = document.getElementById('brand-name');
        const logoContainer = document.getElementById('logo-container');

        let isSidebarOpen = true;

        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            
            if (isSidebarOpen) {
                // Expand Sidebar
                sidebar.classList.remove('w-20');
                sidebar.classList.add('w-[260px]');
                
                logoContainer.classList.remove('justify-center', 'w-full');
                brandName.classList.remove('hidden');
                collapseBtn.classList.remove('hidden');
                expandBtn.classList.add('hidden');
                
                sidebarTexts.forEach(text => text.classList.remove('hidden'));
            } else {
                // Collapse Sidebar
                sidebar.classList.remove('w-[260px]');
                sidebar.classList.add('w-20');
                
                logoContainer.classList.add('justify-center', 'w-full');
                brandName.classList.add('hidden');
                collapseBtn.classList.add('hidden');
                expandBtn.classList.remove('hidden');
                
                sidebarTexts.forEach(text => text.classList.add('hidden'));
            }
        }

        collapseBtn.addEventListener('click', toggleSidebar);
        expandBtn.addEventListener('click', toggleSidebar);

        // ---- Task Management Logic ----
        
        let tasks = []; // Array to store task data

        // DOM Elements for Navigation & Views
        const navAddTask = document.getElementById('nav-add-task');
        const navTaskList = document.getElementById('nav-task-list');
        const viewAddTask = document.getElementById('view-add-task');
        const viewTaskList = document.getElementById('view-task-list');
        const pageTitle = document.getElementById('page-title');
        
        // Form & Table
        const taskForm = document.getElementById('task-form');
        const taskTableBody = document.getElementById('task-table-body');

        // Function to switch active views
        function switchView(viewName) {
            // Reset nav styles
            [navAddTask, navTaskList].forEach(nav => {
                nav.classList.remove('bg-white', 'text-gray-900', 'shadow-sm');
                nav.classList.add('text-gray-400', 'hover:text-white', 'hover:bg-gray-800');
                nav.querySelector('i').classList.remove('text-gray-900');
                nav.querySelector('i').classList.add('group-hover:text-white');
                nav.querySelector('span').classList.remove('font-semibold');
                nav.querySelector('span').classList.add('font-medium');
            });

            // Hide all views
            viewAddTask.classList.add('hidden');
            viewTaskList.classList.add('hidden');

            if (viewName === 'add') {
                viewAddTask.classList.remove('hidden');
                pageTitle.textContent = 'Add New Task';
                
                // Set active nav styling
                navAddTask.classList.add('bg-white', 'text-gray-900', 'shadow-sm');
                navAddTask.classList.remove('text-gray-400', 'hover:text-white', 'hover:bg-gray-800');
                navAddTask.querySelector('i').classList.add('text-gray-900');
                navAddTask.querySelector('span').classList.add('font-semibold');
            } else if (viewName === 'list') {
                viewTaskList.classList.remove('hidden');
                pageTitle.textContent = 'Tasks List';
                
                // Set active nav styling
                navTaskList.classList.add('bg-white', 'text-gray-900', 'shadow-sm');
                navTaskList.classList.remove('text-gray-400', 'hover:text-white', 'hover:bg-gray-800');
                navTaskList.querySelector('i').classList.add('text-gray-900');
                navTaskList.querySelector('span').classList.add('font-semibold');
                
                renderTasks(); // Update table when switching to this view
            }
        }

        // Navigation Event Listeners
        navAddTask.addEventListener('click', (e) => {
            e.preventDefault();
            switchView('add');
        });

        navTaskList.addEventListener('click', (e) => {
            e.preventDefault();
            switchView('list');
        });

        // Form Submit Handler
        taskForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload

            // Gather Data
            const newTask = {
                timeFrom: document.getElementById('time-from').value,
                timeTo: document.getElementById('time-to').value,
                category: document.getElementById('task-category').value,
                outcome: document.getElementById('task-outcome').value,
                remarks: document.getElementById('task-remarks').value || 'N/A'
            };

            // Format 24hr time to 12hr AM/PM for display
            newTask.displayTime = formatTimeRange(newTask.timeFrom, newTask.timeTo);

            // Add to array
            tasks.push(newTask);

            // Clear the form
            taskForm.reset();

            // Switch to Tasks List view to see the new task
            switchView('list');
        });

        // Render Tasks to Table
        function renderTasks() {
            taskTableBody.innerHTML = ''; // Clear current rows

            if (tasks.length === 0) {
                taskTableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                            No tasks added yet. Create a new task to see it here!
                        </td>
                    </tr>
                `;
                return;
            }

            tasks.forEach(task => {
                // Determine Category Badge Color
                let badgeColor = 'bg-gray-100 text-gray-800';
                if (task.category === 'Development') badgeColor = 'bg-blue-100 text-blue-800';
                if (task.category === 'Design') badgeColor = 'bg-purple-100 text-purple-800';
                if (task.category === 'Meeting') badgeColor = 'bg-amber-100 text-amber-800';
                if (task.category === 'Planning') badgeColor = 'bg-emerald-100 text-emerald-800';

                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${task.displayTime}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2.5 py-1 rounded-full text-xs font-medium ${badgeColor}">
                            ${task.category}
                        </span>
                    </td>
                    <td class="px-6 py-4"><div class="max-w-xs truncate" title="${task.outcome}">${task.outcome}</div></td>
                    <td class="px-6 py-4"><div class="max-w-xs text-gray-500 truncate" title="${task.remarks}">${task.remarks}</div></td>
                `;
                taskTableBody.appendChild(row);
            });
            
            // Re-initialize any new icons if we add them inside the table later
            lucide.createIcons();
        }

        // Helper: Format Time Range
        function formatTimeRange(start, end) {
            const formatTime = (timeString) => {
                if(!timeString) return '';
                let [hours, minutes] = timeString.split(':');
                hours = parseInt(hours);
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; // the hour '0' should be '12'
                return `${hours}:${minutes} ${ampm}`;
            };
            return `${formatTime(start)} - ${formatTime(end)}`;
        }

    </script>
</body>
</html>
