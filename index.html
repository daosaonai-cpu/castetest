<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Deep Dive: 90-Minute Workbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* Zinc 950 */
            color: #fafafa;
            overflow: hidden;
            user-select: none;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        canvas {
            background-color: #18181b; /* Zinc 900 */
            border-radius: 0.5rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            touch-action: none;
        }

        .module-btn {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .module-btn:hover { background-color: #27272a; }
        .module-btn.active {
            background-color: #27272a;
            border-left-color: #06b6d4; /* Cyan 500 */
            color: #fff;
        }

        .tab-btn {
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active {
            border-bottom-color: #06b6d4;
            color: #06b6d4;
        }

        /* Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #3f3f46;
            border-radius: 2px;
        }
        
        .canvas-grid {
            position: absolute; inset: 0; pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 p-3 flex justify-between items-center shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-cyan-500/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            </div>
            <h1 class="text-lg font-bold text-zinc-100 tracking-tight">ML Workbench <span class="text-zinc-500 font-normal text-sm ml-2 hidden sm:inline">90-Minute Activity</span></h1>
        </div>
        <div class="flex items-center gap-4 text-sm font-mono text-cyan-400 bg-zinc-950 px-4 py-1.5 rounded-full border border-zinc-800 shadow-inner">
            <span id="session-timer">00:00</span>
        </div>
    </header>

    <!-- Main App Container -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Modules -->
        <aside class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col shrink-0 hidden md:flex">
            <div class="p-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Experiments</div>
            <nav id="module-nav" class="flex-1 flex flex-col">
                <!-- Injected via JS -->
            </nav>
            <div class="p-4 border-t border-zinc-800">
                <button id="btn-clear-all" class="w-full py-2 bg-zinc-800 hover:bg-zinc-700 text-red-400 text-sm font-medium rounded transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear Workspace
                </button>
            </div>
        </aside>

        <!-- Center: Interactive Canvas -->
        <section class="flex-1 flex flex-col p-4 bg-black relative">
            <!-- Mobile Nav Dropdown -->
            <select id="mobile-nav" class="md:hidden w-full bg-zinc-900 border border-zinc-700 text-white p-2 rounded mb-4 font-medium outline-none focus:border-cyan-500"></select>

            <!-- Dynamic Controls Bar -->
            <div id="controls-bar" class="h-14 mb-4 flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-lg px-4 shrink-0 shadow-lg overflow-x-auto">
                <!-- Injected via JS -->
            </div>

            <!-- Canvas Area -->
            <div class="flex-1 relative rounded-lg overflow-hidden border border-zinc-800" id="canvas-wrapper">
                <div class="canvas-grid"></div>
                <canvas id="main-canvas" class="w-full h-full block absolute inset-0"></canvas>
            </div>
        </section>

        <!-- Right Sidebar: Context & Tasks -->
        <aside class="w-80 bg-zinc-900 border-l border-zinc-800 flex flex-col shrink-0 hidden lg:flex">
            <!-- Tabs -->
            <div class="flex border-b border-zinc-800 shrink-0">
                <button class="tab-btn active flex-1 py-3 text-sm font-medium text-zinc-400" data-tab="task">Activity Task</button>
                <button class="tab-btn flex-1 py-3 text-sm font-medium text-zinc-400" data-tab="def">Definitions</button>
            </div>
            
            <!-- Tab Content Area -->
            <div class="flex-1 overflow-y-auto p-5" id="right-panel-content">
                <!-- Content injected via JS based on active module and tab -->
            </div>
        </aside>

    </main>

    <script>
        /**
         * State & Configuration
         */
        const state = {
            activeModuleId: 'bias-variance',
            activeTab: 'task',
            points: [],
            params: {
                complexity: 50, // 1 to 100 (for Bias/Variance)
                kValue: 3,      // for KNN
                distanceMetric: 'euclidean', // 'euclidean' or 'manhattan'
                numClusters: 3, // for K-Means
                boundaryType: 'linear' // 'linear' or 'nonlinear'
            },
            // Specific state variables
            kMeansState: { centroids: [], assignments: [], step: 0 },
            mousePos: { x: -100, y: -100 } // Track mouse for hover effects
        };

        const colors = {
            cyan: '#06b6d4',
            magenta: '#d946ef',
            yellow: '#eab308',
            emerald: '#10b981',
            red: '#ef4444',
            bg: '#18181b',
            grid: 'rgba(255,255,255,0.05)'
        };

        const clusterColors = [colors.cyan, colors.magenta, colors.yellow, colors.emerald, colors.red];

        // The Curriculum Data
        const modules = [
            {
                id: 'bias-variance',
                title: '1. Bias vs. Variance',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />',
                controls: `
                    <div class="flex items-center gap-4 w-full">
                        <button id="btn-gen-sine" class="px-3 py-1 bg-zinc-800 hover:bg-zinc-700 text-sm font-medium rounded transition">Generate Wave</button>
                        <div class="h-6 w-px bg-zinc-700"></div>
                        <div class="flex-1 flex items-center gap-3">
                            <label class="text-sm font-medium text-zinc-400 whitespace-nowrap">Model Complexity:</label>
                            <input type="range" id="slider-complexity" min="1" max="100" value="50">
                            <span id="val-complexity" class="font-mono text-cyan-400 w-24 text-right text-xs">Balanced</span>
                        </div>
                    </div>
                `,
                taskHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Exploring the Tradeoff</h3>
                    <p class="text-zinc-300 text-sm mb-4 leading-relaxed">In this experiment, you will fit a curve to noisy data generated from a hidden sine wave.</p>
                    <ol class="list-decimal pl-5 text-sm text-zinc-400 space-y-3 marker:text-cyan-500">
                        <li>Click <strong>Generate Wave</strong> to create a dataset. Notice the points don't form a perfect line; they have random noise.</li>
                        <li>Slide <em>Model Complexity</em> to the far left (High Bias). What does the model look like? Does it capture the wave?</li>
                        <li>Slide it to the far right (High Variance). The model now hits almost every point. Why might this be bad for predicting <em>new</em> data?</li>
                    </ol>
                    <div class="mt-6 p-4 bg-cyan-950/30 border border-cyan-900/50 rounded-lg">
                        <strong class="text-cyan-400 text-sm block mb-1">Group Discussion Prompt:</strong>
                        <p class="text-xs text-zinc-300">If you were building a model to predict stock prices, would you prefer a model with slight bias or extreme variance? Why?</p>
                    </div>
                `,
                defHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Key Definitions</h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-cyan-400 font-semibold text-sm mb-1">Bias (Underfitting)</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">Error introduced by approximating a real-world problem with a model that is too simple (e.g., using a straight line to model a curve). High bias models ignore data nuances.</p>
                        </div>
                        <div>
                            <h4 class="text-magenta-400 font-semibold text-sm mb-1">Variance (Overfitting)</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">Error introduced by a model being too sensitive to small fluctuations in the training data. High variance models memorize the "noise" rather than the actual pattern.</p>
                        </div>
                        <div>
                            <h4 class="text-yellow-400 font-semibold text-sm mb-1">The Sweet Spot</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">The goal of Machine Learning is finding the balance where the model is complex enough to capture the true pattern (low bias) but simple enough to ignore the random noise (low variance).</p>
                        </div>
                    </div>
                `,
                onLoad: () => { state.points = []; state.params.complexity = 50; }
            },
            {
                id: 'knn-distance',
                title: '2. KNN & Distance Metrics',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />',
                controls: `
                    <div class="flex items-center gap-4 w-full">
                        <button id="btn-gen-scatter" class="px-3 py-1 bg-zinc-800 hover:bg-zinc-700 text-sm font-medium rounded transition">Scatter Points</button>
                        <div class="h-6 w-px bg-zinc-700"></div>
                        <div class="flex items-center gap-2">
                            <label class="text-sm font-medium text-zinc-400">K = <span id="val-k" class="text-magenta-400 font-mono">3</span></label>
                            <input type="range" id="slider-k" min="1" max="15" step="1" value="3" class="w-24">
                        </div>
                        <div class="h-6 w-px bg-zinc-700"></div>
                        <div class="flex bg-zinc-800 p-0.5 rounded">
                            <button id="btn-metric-euc" class="px-3 py-1 text-xs font-medium rounded bg-zinc-700 text-white transition">Euclidean</button>
                            <button id="btn-metric-man" class="px-3 py-1 text-xs font-medium rounded text-zinc-400 hover:text-white transition">Manhattan</button>
                        </div>
                    </div>
                `,
                taskHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Understanding Distance</h3>
                    <p class="text-zinc-300 text-sm mb-4 leading-relaxed">K-Nearest Neighbors classifies data based on what is physically closest to it. But how do we measure "close"?</p>
                    <ol class="list-decimal pl-5 text-sm text-zinc-400 space-y-3 marker:text-magenta-500">
                        <li>Click <strong>Scatter Points</strong>.</li>
                        <li><strong>Move your mouse</strong> over the canvas. Your mouse acts as a new, unclassified point. Watch the algorithm find the nearest neighbors dynamically.</li>
                        <li>Toggle between <strong>Euclidean</strong> and <strong>Manhattan</strong> distance. Observe how the shape of the search boundary changes from a circle to a diamond.</li>
                        <li>Increase <strong>K</strong>. How does the area expand?</li>
                    </ol>
                    <div class="mt-6 p-4 bg-magenta-950/30 border border-magenta-900/50 rounded-lg">
                        <strong class="text-magenta-400 text-sm block mb-1">Observation Task:</strong>
                        <p class="text-xs text-zinc-300">Find a spot on the canvas where switching from Euclidean to Manhattan changes <em>which</em> points are selected as neighbors. Why does this happen?</p>
                    </div>
                `,
                defHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Distance Metrics</h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-magenta-400 font-semibold text-sm mb-1">Euclidean Distance (L2 Norm)</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">The "as the crow flies" straight-line distance between two points. Calculated using the Pythagorean theorem: <code>√((x₂-x₁)² + (y₂-y₁)²)</code>. It forms circular search areas.</p>
                        </div>
                        <div>
                            <h4 class="text-cyan-400 font-semibold text-sm mb-1">Manhattan Distance (L1 Norm)</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">Also known as "city block" distance. It calculates the distance by only allowing strictly horizontal and vertical movements: <code>|x₂-x₁| + |y₂-y₁|</code>. It forms diamond-shaped search areas.</p>
                        </div>
                        <div>
                            <h4 class="text-zinc-200 font-semibold text-sm mb-1">Why does it matter?</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">In datasets with many dimensions (e.g., 100 features), Euclidean distance often breaks down and loses meaning (Curse of Dimensionality). Manhattan distance can sometimes remain more robust in high dimensions.</p>
                        </div>
                    </div>
                `,
                onLoad: () => { state.points = []; state.params.kValue = 3; state.params.distanceMetric = 'euclidean'; }
            },
            {
                id: 'kmeans',
                title: '3. Unsupervised K-Means',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />',
                controls: `
                    <div class="flex items-center gap-3 w-full">
                        <button id="btn-kmeans-points" class="px-3 py-1 bg-zinc-800 hover:bg-zinc-700 text-xs font-medium rounded transition">Add Random Group</button>
                        <div class="flex items-center gap-2 bg-zinc-800 px-2 py-1 rounded">
                            <label class="text-xs font-medium text-zinc-400">Clusters (K): <span id="val-kmeans-k" class="text-yellow-400 font-mono">3</span></label>
                            <input type="range" id="slider-kmeans-k" min="2" max="5" step="1" value="3" class="w-16">
                        </div>
                        <div class="flex-1 flex justify-end gap-2">
                            <button id="btn-kmeans-init" class="px-3 py-1 bg-yellow-900/30 text-yellow-400 border border-yellow-900/50 hover:bg-yellow-900/50 text-xs font-bold rounded transition">1. Init Centroids</button>
                            <button id="btn-kmeans-step" class="px-3 py-1 bg-yellow-600 hover:bg-yellow-500 text-black text-xs font-bold rounded transition shadow shadow-yellow-600/20 disabled:opacity-50 disabled:cursor-not-allowed" disabled>2. Step algorithm</button>
                        </div>
                    </div>
                `,
                taskHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Finding Hidden Patterns</h3>
                    <p class="text-zinc-300 text-sm mb-4 leading-relaxed">Unlike Regression or KNN, here we don't know the "answers". The algorithm must find groupings on its own.</p>
                    <ol class="list-decimal pl-5 text-sm text-zinc-400 space-y-3 marker:text-yellow-500">
                        <li>Click <strong>Add Random Group</strong> 3 or 4 times to scatter data around the canvas.</li>
                        <li>Set Clusters (K) to 3, and click <strong>Init Centroids</strong>. Notice the star icons appear randomly.</li>
                        <li>Click <strong>Step Algorithm</strong>. Watch two things happen:
                            <ul class="list-disc pl-4 mt-1 text-xs">
                                <li>Points change color to match their nearest centroid.</li>
                                <li>The centroid moves to the geometric center (mean) of its points.</li>
                            </ul>
                        </li>
                        <li>Keep clicking <strong>Step</strong> until the centroids stop moving (convergence).</li>
                    </ol>
                    <div class="mt-6 p-4 bg-yellow-950/30 border border-yellow-900/50 rounded-lg">
                        <strong class="text-yellow-400 text-sm block mb-1">Critical Thinking:</strong>
                        <p class="text-xs text-zinc-300">Clear the canvas. Draw two distinct groups, but put one single "outlier" point far away in the corner. Run K-Means. Does the outlier steal an entire centroid for itself? Why?</p>
                    </div>
                `,
                defHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Unsupervised Learning</h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-yellow-400 font-semibold text-sm mb-1">Supervised vs Unsupervised</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed"><strong>Supervised</strong> learning uses labeled data (e.g., predicting "Cat" vs "Dog"). <strong>Unsupervised</strong> learning uses raw, unlabeled data and tries to discover underlying structure automatically.</p>
                        </div>
                        <div>
                            <h4 class="text-yellow-400 font-semibold text-sm mb-1">Centroid</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">The calculated center of a cluster. In K-Means, it represents the average position of all data points assigned to that specific cluster.</p>
                        </div>
                        <div>
                            <h4 class="text-yellow-400 font-semibold text-sm mb-1">Convergence</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">The state where the algorithm has stabilized. In K-Means, convergence is reached when stepping the algorithm no longer causes the centroids to move or reassign points.</p>
                        </div>
                    </div>
                `,
                onLoad: () => { 
                    state.points = []; 
                    state.params.numClusters = 3; 
                    state.kMeansState = { centroids: [], assignments: [], step: 0 }; 
                }
            },
            {
                id: 'boundaries',
                title: '4. Decision Boundaries',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />',
                controls: `
                    <div class="flex items-center gap-4 w-full">
                        <div class="flex bg-zinc-800 p-0.5 rounded items-center">
                            <span class="text-xs text-zinc-500 px-2 font-medium">Draw:</span>
                            <button id="btn-draw-class0" class="px-3 py-1 text-xs font-bold rounded bg-cyan-600 text-white transition shadow shadow-cyan-600/30">Class A</button>
                            <button id="btn-draw-class1" class="px-3 py-1 text-xs font-bold rounded text-zinc-400 hover:text-white transition">Class B</button>
                        </div>
                        <button id="btn-gen-rings" class="px-3 py-1 bg-zinc-800 hover:bg-zinc-700 text-xs font-medium rounded transition ml-auto">Gen: Concentric</button>
                        <div class="h-6 w-px bg-zinc-700"></div>
                        <div class="flex bg-zinc-800 p-0.5 rounded">
                            <button id="btn-model-lin" class="px-3 py-1 text-xs font-medium rounded bg-emerald-600 text-white transition">Linear Model</button>
                            <button id="btn-model-nonlin" class="px-3 py-1 text-xs font-medium rounded text-zinc-400 hover:text-white transition">Non-Linear (KNN)</button>
                        </div>
                    </div>
                `,
                taskHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">The Limits of Lines</h3>
                    <p class="text-zinc-300 text-sm mb-4 leading-relaxed">A decision boundary is the line (or surface) that separates different classes. Some algorithms can only draw straight lines.</p>
                    <ol class="list-decimal pl-5 text-sm text-zinc-400 space-y-3 marker:text-emerald-500">
                        <li>Ensure <strong>Linear Model</strong> is selected.</li>
                        <li>Select <strong>Class A</strong> and draw a cluster on the left. Select <strong>Class B</strong> and draw on the right. The linear model perfectly separates them.</li>
                        <li>Now, clear the canvas. Click <strong>Gen: Concentric</strong> to generate a dataset where Class A is surrounded by Class B.</li>
                        <li>Observe the Linear Model. Does it work?</li>
                        <li>Switch the model to <strong>Non-Linear (KNN)</strong>. Notice how it wraps around the inner cluster.</li>
                    </ol>
                    <div class="mt-6 p-4 bg-emerald-950/30 border border-emerald-900/50 rounded-lg">
                        <strong class="text-emerald-400 text-sm block mb-1">Group Discussion Prompt:</strong>
                        <p class="text-xs text-zinc-300">If non-linear models are so powerful and can fit any shape, why would Data Scientists ever use simple linear models?</p>
                    </div>
                `,
                defHtml: `
                    <h3 class="font-bold text-white text-lg mb-3">Model Capabilities</h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-emerald-400 font-semibold text-sm mb-1">Linear Decision Boundary</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">Algorithms like Logistic Regression or Linear SVM can only separate data using a single straight line (or flat hyperplane in 3D). They are fast, interpretable, and less prone to severe overfitting, but fail on complex data patterns.</p>
                        </div>
                        <div>
                            <h4 class="text-emerald-400 font-semibold text-sm mb-1">Non-Linear Boundary</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">Algorithms like KNN, Decision Trees, and Neural Networks can create curved, jagged, or enclosed boundaries. They can model highly complex real-world data but risk memorizing noise (overfitting) and are often "black boxes" (hard to interpret).</p>
                        </div>
                        <div>
                            <h4 class="text-zinc-200 font-semibold text-sm mb-1">Linearly Separable</h4>
                            <p class="text-zinc-400 text-xs leading-relaxed">A dataset is "linearly separable" if you can draw a single straight line that perfectly divides the classes without any errors.</p>
                        </div>
                    </div>
                `,
                onLoad: () => { 
                    state.points = []; 
                    state.params.boundaryType = 'linear';
                    // Custom state for drawing class
                    state.drawClass = 0; 
                }
            }
        ];

        // --- DOM Elements ---
        const moduleNav = document.getElementById('module-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const controlsBar = document.getElementById('controls-bar');
        const rightPanelContent = document.getElementById('right-panel-content');
        const btnClearAll = document.getElementById('btn-clear-all');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const timerDisplay = document.getElementById('session-timer');
        
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');

        // --- Timer Logic ---
        let startTime = Date.now();
        setInterval(() => {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }, 1000);

        // --- Initialization & UI Building ---

        function init() {
            // Build Sidebars
            modules.forEach(mod => {
                // Desktop Nav
                const btn = document.createElement('button');
                btn.className = `module-btn w-full text-left px-5 py-3 flex items-center gap-3 text-zinc-400 font-medium ${mod.id === state.activeModuleId ? 'active' : ''}`;
                btn.innerHTML = `<svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">${mod.icon}</svg> ${mod.title}`;
                btn.onclick = () => loadModule(mod.id);
                moduleNav.appendChild(btn);

                // Mobile Nav
                const opt = document.createElement('option');
                opt.value = mod.id;
                opt.textContent = mod.title;
                mobileNav.appendChild(opt);
            });

            mobileNav.addEventListener('change', (e) => loadModule(e.target.value));

            // Tabs
            tabBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    tabBtns.forEach(b => b.classList.remove('active', 'border-cyan-500', 'text-cyan-500'));
                    e.target.classList.add('active', 'border-cyan-500', 'text-cyan-500');
                    state.activeTab = e.target.dataset.tab;
                    updateRightPanel();
                });
            });

            btnClearAll.addEventListener('click', () => {
                state.points = [];
                if(state.activeModuleId === 'kmeans') state.kMeansState = { centroids: [], assignments: [], step: 0 };
                draw();
            });

            window.addEventListener('resize', resizeCanvas);
            
            // Canvas Interactions
            setupCanvasEvents();

            // Load initial
            loadModule(state.activeModuleId);
            resizeCanvas();
        }

        function loadModule(id) {
            state.activeModuleId = id;
            const mod = modules.find(m => m.id === id);
            
            // Update UI
            document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(moduleNav.children).find(b => b.textContent.includes(mod.title));
            if(activeBtn) activeBtn.classList.add('active');
            mobileNav.value = id;

            // Load Controls
            controlsBar.innerHTML = mod.controls;
            bindControlEvents(id);

            // Load Side Panel
            updateRightPanel();

            // Reset state
            mod.onLoad();
            draw();
        }

        function updateRightPanel() {
            const mod = modules.find(m => m.id === state.activeModuleId);
            rightPanelContent.innerHTML = state.activeTab === 'task' ? mod.taskHtml : mod.defHtml;
            // Quick animation
            rightPanelContent.style.opacity = 0;
            rightPanelContent.style.transform = 'translateY(10px)';
            setTimeout(() => {
                rightPanelContent.style.transition = 'all 0.3s ease';
                rightPanelContent.style.opacity = 1;
                rightPanelContent.style.transform = 'translateY(0)';
            }, 50);
        }

        // --- Specific Module Event Binding ---
        function bindControlEvents(id) {
            if (id === 'bias-variance') {
                document.getElementById('btn-gen-sine').onclick = () => {
                    state.points = [];
                    const w = canvas.width;
                    const h = canvas.height;
                    for(let i=0; i<40; i++) {
                        let x = (i/40) * w;
                        // Sine wave + noise
                        let y = h/2 + Math.sin(x/w * Math.PI * 2) * (h/3) + (Math.random() - 0.5) * (h/4);
                        state.points.push({x, y, class: 0});
                    }
                    draw();
                };
                
                const slider = document.getElementById('slider-complexity');
                const valLabel = document.getElementById('val-complexity');
                slider.oninput = (e) => {
                    state.params.complexity = parseInt(e.target.value);
                    if (state.params.complexity < 20) { valLabel.textContent = 'High Bias'; valLabel.className = "font-mono w-24 text-right text-xs text-red-400"; }
                    else if (state.params.complexity > 80) { valLabel.textContent = 'High Variance'; valLabel.className = "font-mono w-24 text-right text-xs text-yellow-400"; }
                    else { valLabel.textContent = 'Balanced'; valLabel.className = "font-mono w-24 text-right text-xs text-cyan-400"; }
                    draw();
                };
            }
            
            if (id === 'knn-distance') {
                document.getElementById('btn-gen-scatter').onclick = () => {
                    state.points = [];
                    const w = canvas.width; const h = canvas.height;
                    for(let i=0; i<30; i++) {
                        state.points.push({
                            x: Math.random() * w, y: Math.random() * h,
                            class: Math.random() > 0.5 ? 0 : 1
                        });
                    }
                    draw();
                };

                const sliderK = document.getElementById('slider-k');
                sliderK.oninput = (e) => {
                    state.params.kValue = parseInt(e.target.value);
                    document.getElementById('val-k').textContent = state.params.kValue;
                    draw();
                };

                const btnEuc = document.getElementById('btn-metric-euc');
                const btnMan = document.getElementById('btn-metric-man');
                btnEuc.onclick = () => {
                    state.params.distanceMetric = 'euclidean';
                    btnEuc.className = "px-3 py-1 text-xs font-medium rounded bg-zinc-700 text-white transition";
                    btnMan.className = "px-3 py-1 text-xs font-medium rounded text-zinc-400 hover:text-white transition";
                    draw();
                };
                btnMan.onclick = () => {
                    state.params.distanceMetric = 'manhattan';
                    btnMan.className = "px-3 py-1 text-xs font-medium rounded bg-zinc-700 text-white transition";
                    btnEuc.className = "px-3 py-1 text-xs font-medium rounded text-zinc-400 hover:text-white transition";
                    draw();
                };
            }

            if (id === 'kmeans') {
                const btnStep = document.getElementById('btn-kmeans-step');
                const btnInit = document.getElementById('btn-kmeans-init');

                document.getElementById('btn-kmeans-points').onclick = () => {
                    const cx = 100 + Math.random() * (canvas.width - 200);
                    const cy = 100 + Math.random() * (canvas.height - 200);
                    for(let i=0; i<15; i++) {
                        state.points.push({ x: cx + (Math.random()-0.5)*150, y: cy + (Math.random()-0.5)*150, class: 0 }); // unassigned class
                    }
                    state.kMeansState.centroids = []; // Reset on new data
                    btnStep.disabled = true;
                    draw();
                };

                const sliderK = document.getElementById('slider-kmeans-k');
                sliderK.oninput = (e) => {
                    state.params.numClusters = parseInt(e.target.value);
                    document.getElementById('val-kmeans-k').textContent = state.params.numClusters;
                    state.kMeansState.centroids = [];
                    btnStep.disabled = true;
                    draw();
                };

                btnInit.onclick = () => {
                    if(state.points.length === 0) return;
                    state.kMeansState.centroids = [];
                    let k = Math.min(state.params.numClusters, state.points.length);
                    // Random points as initial centroids
                    let shuffled = [...state.points].sort(() => 0.5 - Math.random());
                    for(let i=0; i<k; i++) {
                        state.kMeansState.centroids.push({x: shuffled[i].x, y: shuffled[i].y, id: i});
                    }
                    state.kMeansState.step = 0;
                    state.kMeansState.assignments = Array(state.points.length).fill(-1);
                    btnStep.disabled = false;
                    draw();
                };

                btnStep.onclick = () => {
                    kMeansStep();
                    draw();
                };
            }

            if (id === 'boundaries') {
                const btnC0 = document.getElementById('btn-draw-class0');
                const btnC1 = document.getElementById('btn-draw-class1');
                btnC0.onclick = () => {
                    state.drawClass = 0;
                    btnC0.className = "px-3 py-1 text-xs font-bold rounded bg-cyan-600 text-white transition shadow shadow-cyan-600/30";
                    btnC1.className = "px-3 py-1 text-xs font-bold rounded text-zinc-400 hover:text-white transition";
                };
                btnC1.onclick = () => {
                    state.drawClass = 1;
                    btnC1.className = "px-3 py-1 text-xs font-bold rounded bg-magenta-600 text-white transition shadow shadow-magenta-600/30";
                    btnC0.className = "px-3 py-1 text-xs font-bold rounded text-zinc-400 hover:text-white transition";
                };

                document.getElementById('btn-gen-rings').onclick = () => {
                    state.points = [];
                    const cx = canvas.width/2; const cy = canvas.height/2;
                    // Inner ring (Class 0)
                    for(let i=0; i<20; i++) {
                        let a = Math.random() * Math.PI * 2;
                        let r = 30 + Math.random() * 40;
                        state.points.push({x: cx + Math.cos(a)*r, y: cy + Math.sin(a)*r, class: 0});
                    }
                    // Outer ring (Class 1)
                    for(let i=0; i<30; i++) {
                        let a = Math.random() * Math.PI * 2;
                        let r = 120 + Math.random() * 60;
                        state.points.push({x: cx + Math.cos(a)*r, y: cy + Math.sin(a)*r, class: 1});
                    }
                    draw();
                };

                const btnLin = document.getElementById('btn-model-lin');
                const btnNonlin = document.getElementById('btn-model-nonlin');
                btnLin.onclick = () => {
                    state.params.boundaryType = 'linear';
                    btnLin.className = "px-3 py-1 text-xs font-medium rounded bg-emerald-600 text-white transition";
                    btnNonlin.className = "px-3 py-1 text-xs font-medium rounded text-zinc-400 hover:text-white transition";
                    draw();
                };
                btnNonlin.onclick = () => {
                    state.params.boundaryType = 'nonlinear';
                    btnNonlin.className = "px-3 py-1 text-xs font-medium rounded bg-emerald-600 text-white transition";
                    btnLin.className = "px-3 py-1 text-xs font-medium rounded text-zinc-400 hover:text-white transition";
                    draw();
                };
            }
        }

        // --- Canvas Engine ---

        function resizeCanvas() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            draw();
        }

        function setupCanvasEvents() {
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const handleDown = (e) => {
                const pos = getPos(e);
                
                if (state.activeModuleId === 'kmeans' && state.kMeansState.centroids.length > 0) return; // Locked while running

                state.points.push({
                    x: pos.x, y: pos.y, 
                    class: (state.activeModuleId === 'boundaries') ? state.drawClass : (state.activeModuleId === 'knn-distance' ? (Math.random()>0.5?0:1) : 0)
                });
                draw();
            };

            const handleMove = (e) => {
                const pos = getPos(e);
                state.mousePos = pos;
                if (state.activeModuleId === 'knn-distance') draw(); // Needs live updates
            };

            canvas.addEventListener('mousedown', handleDown);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(e); }, {passive: false});
            
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
            
            canvas.addEventListener('mouseleave', () => { state.mousePos = {x:-100, y:-100}; if(state.activeModuleId==='knn-distance') draw(); });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state.points.length === 0 && state.activeModuleId !== 'knn-distance') {
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = '14px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('Workspace Empty. Add data to begin.', canvas.width/2, canvas.height/2);
                return;
            }

            switch(state.activeModuleId) {
                case 'bias-variance': drawBiasVariance(); break;
                case 'knn-distance': drawKNNDistance(); break;
                case 'kmeans': drawKMeans(); break;
                case 'boundaries': drawBoundaries(); break;
            }
        }

        // --- Specific Renderers & Algorithms ---

        function drawBiasVariance() {
            // Draw points
            drawPoints(colors.cyan);

            if (state.points.length < 2) return;

            // Algorithm: Localized Moving Average (Simulates Polynomial Degree / Bias-Variance)
            // Complexity 1 -> Window = canvas width (flat line mean, high bias)
            // Complexity 100 -> Window = very small (connect dots, high variance)
            
            // Map complexity 1-100 to window size (inverse)
            let maxWindow = canvas.width;
            let minWindow = 10;
            // Exponential mapping so the slider feels natural
            let t = (100 - state.params.complexity) / 99; // 0 (high var) to 1 (high bias)
            let windowSize = minWindow + Math.pow(t, 2) * (maxWindow - minWindow);

            let sortedPoints = [...state.points].sort((a, b) => a.x - b.x);

            ctx.beginPath();
            ctx.strokeStyle = colors.magenta;
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';

            for (let px = 0; px <= canvas.width; px += 5) {
                // Find points within window
                let sumY = 0;
                let count = 0;
                let weightSum = 0;

                for (let p of sortedPoints) {
                    let dist = Math.abs(p.x - px);
                    if (dist < windowSize) {
                        // Gaussian-like weight
                        let w = Math.exp(-(dist*dist)/(windowSize*windowSize/4));
                        sumY += p.y * w;
                        weightSum += w;
                        count++;
                    }
                }

                let y;
                if (weightSum > 0) {
                    y = sumY / weightSum;
                } else {
                    // Extrapolate flat if no points
                    y = sortedPoints[px < sortedPoints[0].x ? 0 : sortedPoints.length-1].y;
                }

                if (px === 0) ctx.moveTo(px, y);
                else ctx.lineTo(px, y);
            }
            ctx.stroke();
        }

        function distMetric(p1, p2, metric) {
            if (metric === 'manhattan') return Math.abs(p1.x - p2.x) + Math.abs(p1.y - p2.y);
            return Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
        }

        function drawKNNDistance() {
            drawPointsDynamicClasses();

            if (state.mousePos.x > 0 && state.points.length > 0) {
                let mp = state.mousePos;
                
                // Calculate distances
                let dists = state.points.map(p => ({ p, d: distMetric(mp, p, state.params.distanceMetric) }));
                dists.sort((a,b) => a.d - b.d);
                
                let k = Math.min(state.params.kValue, state.points.length);
                let nearest = dists.slice(0, k);
                let maxD = nearest[k-1].d;

                // Draw bounding shape
                ctx.beginPath();
                if (state.params.distanceMetric === 'manhattan') {
                    ctx.moveTo(mp.x, mp.y - maxD);
                    ctx.lineTo(mp.x + maxD, mp.y);
                    ctx.lineTo(mp.x, mp.y + maxD);
                    ctx.lineTo(mp.x - maxD, mp.y);
                    ctx.closePath();
                } else {
                    ctx.arc(mp.x, mp.y, maxD, 0, Math.PI*2);
                }
                ctx.fillStyle = 'rgba(6, 182, 212, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(6, 182, 212, 0.5)';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw connections
                nearest.forEach(n => {
                    ctx.beginPath();
                    ctx.moveTo(mp.x, mp.y);
                    
                    if(state.params.distanceMetric === 'manhattan') {
                        // Draw L-shape connection for manhattan visualization
                        ctx.lineTo(n.p.x, mp.y);
                        ctx.lineTo(n.p.x, n.p.y);
                    } else {
                        ctx.lineTo(n.p.x, n.p.y);
                    }
                    
                    ctx.strokeStyle = n.p.class === 0 ? colors.cyan : colors.magenta;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.6;
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                    
                    // Highlight point
                    ctx.beginPath();
                    ctx.arc(n.p.x, n.p.y, 8, 0, Math.PI*2);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });

                // Draw synthetic new point
                ctx.beginPath();
                ctx.arc(mp.x, mp.y, 6, 0, Math.PI*2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                // Vote result text
                let count0 = nearest.filter(n=>n.p.class===0).length;
                let count1 = nearest.filter(n=>n.p.class===1).length;
                ctx.fillStyle = count0 > count1 ? colors.cyan : colors.magenta;
                ctx.font = 'bold 12px Inter';
                ctx.fillText(`Predict: ${count0 > count1 ? 'Class A' : 'Class B'}`, mp.x, mp.y - 15);
            }
        }

        function kMeansStep() {
            if(state.kMeansState.centroids.length === 0) return;
            
            let centroids = state.kMeansState.centroids;
            
            // 1. Assign points
            let assignments = [];
            state.points.forEach((p) => {
                let minDist = Infinity;
                let bestC = 0;
                centroids.forEach((c, idx) => {
                    let d = distMetric(p, c, 'euclidean');
                    if (d < minDist) { minDist = d; bestC = idx; }
                });
                assignments.push(bestC);
            });
            state.kMeansState.assignments = assignments;

            // 2. Move centroids
            let newCentroids = [];
            for(let i=0; i<centroids.length; i++) {
                let pts = state.points.filter((_, idx) => assignments[idx] === i);
                if (pts.length > 0) {
                    let avgX = pts.reduce((sum, p) => sum + p.x, 0) / pts.length;
                    let avgY = pts.reduce((sum, p) => sum + p.y, 0) / pts.length;
                    newCentroids.push({x: avgX, y: avgY, id: i});
                } else {
                    newCentroids.push(centroids[i]); // Keep if no points
                }
            }
            state.kMeansState.centroids = newCentroids;
            state.kMeansState.step++;
        }

        function drawKMeans() {
            // Draw lines from points to centroids
            if (state.kMeansState.centroids.length > 0) {
                state.points.forEach((p, i) => {
                    let assignedId = state.kMeansState.assignments[i];
                    if (assignedId !== undefined && assignedId !== -1) {
                        let c = state.kMeansState.centroids[assignedId];
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(c.x, c.y);
                        ctx.strokeStyle = clusterColors[assignedId];
                        ctx.globalAlpha = 0.2;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.globalAlpha = 1.0;
                    }
                });
            }

            // Draw points
            state.points.forEach((p, i) => {
                let assignedId = state.kMeansState.assignments[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                ctx.fillStyle = (assignedId !== undefined && assignedId !== -1) ? clusterColors[assignedId] : '#71717a';
                ctx.fill();
            });

            // Draw Centroids (Stars)
            state.kMeansState.centroids.forEach(c => {
                drawStar(c.x, c.y, 5, 12, 6, clusterColors[c.id]);
            });
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx; let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawBoundaries() {
            let has0 = state.points.some(p=>p.class===0);
            let has1 = state.points.some(p=>p.class===1);

            if (has0 && has1) {
                const blockSize = 12; // Resolution
                const cols = Math.ceil(canvas.width / blockSize);
                const rows = Math.ceil(canvas.height / blockSize);

                // Precompute Linear Model (Logistic Regression approx via Perceptron/Means)
                let linW = [0,0], linB = 0;
                if (state.params.boundaryType === 'linear') {
                    // Simple centroid vector method for linear separation
                    let m0 = {x:0, y:0}, c0 = 0;
                    let m1 = {x:0, y:0}, c1 = 0;
                    state.points.forEach(p => {
                        if(p.class===0){ m0.x+=p.x; m0.y+=p.y; c0++; }
                        else { m1.x+=p.x; m1.y+=p.y; c1++; }
                    });
                    m0.x/=c0; m0.y/=c0; m1.x/=c1; m1.y/=c1;
                    
                    // Vector from m0 to m1 is the normal to the boundary
                    linW = [m1.x - m0.x, m1.y - m0.y];
                    // Midpoint
                    let midX = (m0.x + m1.x)/2; let midY = (m0.y + m1.y)/2;
                    linB = -(linW[0]*midX + linW[1]*midY);
                }

                ctx.globalAlpha = 0.5;
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        let cx = i * blockSize + blockSize/2;
                        let cy = j * blockSize + blockSize/2;
                        
                        let pred = 0;
                        if (state.params.boundaryType === 'linear') {
                            pred = (linW[0]*cx + linW[1]*cy + linB) > 0 ? 1 : 0;
                        } else {
                            // Non-linear: KNN (K=1 for crisp boundary)
                            let minDist = Infinity;
                            state.points.forEach(p => {
                                let d = (p.x-cx)**2 + (p.y-cy)**2;
                                if(d < minDist){ minDist=d; pred=p.class; }
                            });
                        }

                        ctx.fillStyle = pred === 0 ? 'rgba(6, 182, 212, 0.2)' : 'rgba(217, 70, 239, 0.2)';
                        ctx.fillRect(i * blockSize, j * blockSize, blockSize, blockSize);
                    }
                }
                ctx.globalAlpha = 1.0;
            }

            drawPointsDynamicClasses();
        }

        // --- Helpers ---
        function drawPoints(overrideColor = null) {
            state.points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                ctx.fillStyle = overrideColor || '#fff';
                ctx.fill();
            });
        }

        function drawPointsDynamicClasses() {
            state.points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
                ctx.fillStyle = p.class === 0 ? colors.cyan : colors.magenta;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = '#fff';
                ctx.stroke();
            });
        }

        // Start
        init();

    </script>
</body>
</html>
