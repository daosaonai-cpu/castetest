<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Main 2026 Physics - Smart Board Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- html2canvas for Snapshots -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            overflow: hidden;
            margin: 0;
        }

        .slide-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex: 1;
            display: flex;
            gap: 24px;
            padding: 24px;
            overflow: hidden;
            padding-bottom: 0; /* Maximize space */
        }

        .question-panel {
            flex: 1;
            background: #525659; /* Standard PDF viewer background color */
            border-radius: 16px 16px 0 0; /* Rounded top only */
            padding: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: auto;
            border: 1px solid #e1e4e8;
            border-bottom: none;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        .solving-panel {
            flex: 1.2;
            background: #ffffff;
            border-radius: 16px 16px 0 0; /* Rounded top only */
            border: 3px dashed #cbd5e1;
            border-bottom: none;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .solving-panel::before {
            content: "SMART BOARD SOLVING SPACE";
            color: #94a3b8;
            font-weight: 800;
            letter-spacing: 0.1em;
            font-size: 1.5rem;
            opacity: 0.2;
        }

        /* PDF Canvas Styling */
        #the-canvas {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-upload-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Flash animation for snapshot */
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .flash-effect {
            animation: flash 0.3s ease-out;
        }
        
        /* Custom Scrollbar for dark theme pdf viewer */
        .question-panel::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        .question-panel::-webkit-scrollbar-track {
            background: #404040;
        }
        .question-panel::-webkit-scrollbar-thumb {
            background: #707070;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <!-- Top Header with Compact Controls -->
    <header class="bg-slate-900 text-white p-3 flex justify-between items-center shadow-md shrink-0 z-10">
        <!-- Left: Navigation -->
        <div class="flex items-center gap-2">
            <button id="prev" class="bg-slate-700 hover:bg-slate-600 p-1.5 rounded disabled:opacity-30 disabled:hover:bg-slate-700 transition-colors" title="Previous Page">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div id="page-counter" class="font-mono text-sm bg-slate-800 px-3 py-1 rounded border border-slate-700 min-w-[80px] text-center">
                -- / --
            </div>
            <button id="next" class="bg-slate-700 hover:bg-slate-600 p-1.5 rounded disabled:opacity-30 disabled:hover:bg-slate-700 transition-colors" title="Next Page">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>

        <!-- Center: Zoom Controls -->
        <div class="flex items-center gap-1 bg-slate-800 rounded p-1 border border-slate-700">
            <button id="zoom-out" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Zoom Out">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
            <span id="zoom-level" class="text-xs font-mono w-10 text-center text-slate-300">100%</span>
            <button id="zoom-in" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Zoom In">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </button>
        </div>

        <!-- Right: Actions -->
        <div class="flex items-center gap-4">
            <span class="text-xs text-slate-500 font-medium hidden md:inline">Snapshot: <kbd class="font-mono bg-slate-800 px-1 rounded border border-slate-700 text-slate-300">P</kbd></span>
            <div class="file-upload-wrapper">
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex items-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Load PDF
                </button>
                <input type="file" id="pdf-upload" accept=".pdf" />
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="content-area" id="capture-area">
        <div id="question-panel" class="question-panel">
            <div id="empty-state" class="text-slate-400 text-center p-8 flex flex-col items-center mt-20">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-50"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                <p>Upload a PDF file to begin</p>
            </div>
            <canvas id="the-canvas" class="hidden"></canvas>
        </div>
        <div class="solving-panel">
            <!-- Empty for Smart Board interaction -->
        </div>
    </div>
</div>

<script>
    // PDF State
    const state = {
        pdf: null,
        pageNum: 1,
        pageRendering: false,
        pageNumPending: null,
        scale: 1.0,
        canvas: document.getElementById('the-canvas'),
        ctx: document.getElementById('the-canvas').getContext('2d'),
        container: document.getElementById('question-panel')
    };

    /**
     * Get page info from document, resize canvas accordingly, and render page.
     */
    function renderPage(num) {
        state.pageRendering = true;
        
        // Fetch page
        state.pdf.getPage(num).then(function(page) {
            
            // Calculate scale to fit width (with some padding)
            // We default to fitting width if zoom hasn't been manually set crazy high
            const containerWidth = state.container.clientWidth - 40; // 40px padding
            const unscaledViewport = page.getViewport({scale: 1});
            const fitScale = containerWidth / unscaledViewport.width;
            
            // If it's the first load or user hasn't zoomed manually much, auto-fit width
            // Otherwise use current state.scale
            const viewport = page.getViewport({scale: state.scale * fitScale}); // Use relative scale factor

            state.canvas.height = viewport.height;
            state.canvas.width = viewport.width;

            // Render PDF page into canvas context
            const renderContext = {
                canvasContext: state.ctx,
                viewport: viewport
            };
            const renderTask = page.render(renderContext);

            // Wait for render to finish
            renderTask.promise.then(function() {
                state.pageRendering = false;
                if (state.pageNumPending !== null) {
                    // New page rendering is pending
                    renderPage(state.pageNumPending);
                    state.pageNumPending = null;
                }
            });
        });

        // Update page counters
        document.getElementById('page-counter').textContent = `${String(num).padStart(2, '0')} / ${state.pdf.numPages}`;
        document.getElementById('zoom-level').textContent = Math.round(state.scale * 100) + "%";

        // Update Button States
        document.getElementById('prev').disabled = num <= 1;
        document.getElementById('next').disabled = num >= state.pdf.numPages;
    }

    /**
     * If another page rendering in progress, waits until the rendering is
     * finised. Otherwise, executes rendering immediately.
     */
    function queueRenderPage(num) {
        if (state.pageRendering) {
            state.pageNumPending = num;
        } else {
            renderPage(num);
        }
    }

    /**
     * Displays previous page.
     */
    function onPrevPage() {
        if (state.pageNum <= 1) {
            return;
        }
        state.pageNum--;
        queueRenderPage(state.pageNum);
    }
    document.getElementById('prev').addEventListener('click', onPrevPage);

    /**
     * Displays next page.
     */
    function onNextPage() {
        if (state.pageNum >= state.pdf.numPages) {
            return;
        }
        state.pageNum++;
        queueRenderPage(state.pageNum);
    }
    document.getElementById('next').addEventListener('click', onNextPage);

    /**
     * Keyboard Navigation & Snapshot
     */
    document.addEventListener('keydown', (e) => {
        if (e.key === "p" || e.key === "P") {
            takeSnapshot();
            return;
        }

        if (!state.pdf) return;
        if (e.key === "ArrowRight") onNextPage();
        if (e.key === "ArrowLeft") onPrevPage();
    });

    /**
     * Snapshot Logic
     */
    function takeSnapshot() {
        const captureElement = document.getElementById('capture-area');
        
        // Add flash effect for feedback
        captureElement.classList.add('flash-effect');
        setTimeout(() => captureElement.classList.remove('flash-effect'), 300);

        html2canvas(captureElement, {
            scale: 2, // High resolution
            useCORS: true,
            logging: false,
            backgroundColor: '#f0f2f5',
            ignoreElements: (element) => {
                // Ignore scrollbars if possible or specific UI controls if needed
                return false;
            }
        }).then(canvas => {
            // Create download link
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            link.download = `smart-board-snapshot-${timestamp}.png`;
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }).catch(err => {
            console.error('Snapshot failed:', err);
            alert('Failed to take snapshot.');
        });
    }

    /**
     * Zoom Controls
     */
    document.getElementById('zoom-in').addEventListener('click', () => {
        if(!state.pdf) return;
        state.scale += 0.2;
        queueRenderPage(state.pageNum);
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
        if(!state.pdf) return;
        if (state.scale > 0.4) {
            state.scale -= 0.2;
            queueRenderPage(state.pageNum);
        }
    });


    /**
     * File Upload Handling
     */
    document.getElementById('pdf-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type === "application/pdf") {
            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);

                // Load PDF
                pdfjsLib.getDocument(typedarray).promise.then(function(pdfDoc) {
                    state.pdf = pdfDoc;
                    state.pageNum = 1;
                    
                    // UI Updates
                    document.getElementById('empty-state').classList.add('hidden');
                    document.getElementById('the-canvas').classList.remove('hidden');
                    
                    renderPage(state.pageNum);
                });
            };
            fileReader.readAsArrayBuffer(file);
        }
    });
</script>

</body>
</html>
