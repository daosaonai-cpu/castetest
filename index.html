<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Prerequisites Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* Zinc 950 */
            color: #fafafa; /* Zinc 50 */
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        .nav-btn {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .nav-btn:hover { background-color: #27272a; }
        .nav-btn.active {
            background-color: #27272a;
            border-left-color: #06b6d4; /* Cyan 500 */
            color: #fff;
        }

        .note-card {
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Interactive Slider styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #d946ef; /* Magenta */
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #3f3f46;
            border-radius: 2px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-cyan-500/30">

    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 p-4 flex justify-between items-center shrink-0 z-10 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-500 flex items-center justify-center font-bold text-white shadow-lg shadow-cyan-500/20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-zinc-100 tracking-tight">Pre-Flight Manual</h1>
                <p class="text-xs text-cyan-400 font-mono mt-0.5">ML Concepts Prerequisites</p>
            </div>
        </div>
        <div class="hidden sm:flex text-sm text-zinc-400 font-medium">
            Read before starting the 90-Minute Workbench
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-1 flex overflow-hidden w-full relative">
        
        <!-- Mobile Menu Toggle -->
        <div class="md:hidden absolute top-4 left-4 z-20">
            <select id="mobile-nav" class="bg-zinc-800 border border-zinc-700 text-white p-2 rounded shadow-lg outline-none focus:border-cyan-500 text-sm">
                <option value="intro">1. Introduction</option>
                <option value="math">2. Coordinate Geometry</option>
                <option value="learning">3. Types of Learning</option>
                <option value="fitting">4. Model Fitting</option>
                <option value="eval">5. Evaluation Metrics</option>
            </select>
        </div>

        <!-- Left Sidebar: Topics -->
        <aside class="w-72 bg-zinc-900 border-r border-zinc-800 flex-col shrink-0 hidden md:flex shadow-xl z-10">
            <div class="p-5 pb-2 text-xs font-bold text-zinc-500 uppercase tracking-wider">Notebooks</div>
            <nav id="sidebar-nav" class="flex-1 flex flex-col py-2">
                <!-- Injected via JS -->
            </nav>
            <div class="p-5 border-t border-zinc-800">
                <div class="bg-zinc-800/50 p-4 rounded-lg border border-zinc-700/50">
                    <p class="text-xs text-zinc-400 leading-relaxed text-center">
                        Master these concepts to understand the mechanics behind KNN, K-Means, and Regression boundaries.
                    </p>
                </div>
            </div>
        </aside>

        <!-- Right Content Area -->
        <section class="flex-1 bg-[#09090b] overflow-y-auto relative scroll-smooth p-6 md:p-10 pt-16 md:pt-10" id="content-area">
            <!-- Content injected via JS -->
        </section>

    </main>

    <script>
        const topics = [
            {
                id: 'intro',
                title: '1. Introduction to ML',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />',
                accent: 'text-white',
                content: `
                    <div class="max-w-3xl mx-auto">
                        <h2 class="text-3xl font-bold mb-2">Welcome to Machine Learning</h2>
                        <p class="text-zinc-400 text-lg mb-8">Before we dive into the workbench experiments, let's establish a baseline vocabulary.</p>
                        
                        <div class="note-card">
                            <h3 class="text-xl font-semibold mb-3 text-cyan-400">What is Machine Learning?</h3>
                            <p class="text-zinc-300 leading-relaxed mb-4">
                                Traditional programming requires you to write rules (code) and provide data to get answers. Machine Learning flips this: you provide the data and the answers, and the computer figures out the rules.
                            </p>
                            <div class="flex flex-col md:flex-row gap-4 mt-6">
                                <div class="flex-1 bg-zinc-800/50 p-4 rounded border border-zinc-700">
                                    <div class="text-xs font-mono text-zinc-500 mb-2">TRADITIONAL</div>
                                    <div class="font-medium text-sm">Data + Rules = Answers</div>
                                </div>
                                <div class="flex-1 bg-cyan-900/20 p-4 rounded border border-cyan-800/50">
                                    <div class="text-xs font-mono text-cyan-500 mb-2">MACHINE LEARNING</div>
                                    <div class="font-medium text-sm">Data + Answers = Rules</div>
                                </div>
                            </div>
                        </div>

                        <div class="note-card">
                            <h3 class="text-xl font-semibold mb-3 text-white">Features and Labels</h3>
                            <ul class="space-y-4 text-zinc-300 text-sm">
                                <li class="flex items-start gap-3">
                                    <div class="mt-1 bg-zinc-800 p-1.5 rounded text-cyan-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg></div>
                                    <div>
                                        <strong class="text-white block text-base mb-1">Features (Input / X)</strong>
                                        The measurable properties of the data you are analyzing. E.g., The square footage, number of bedrooms, and zip code of a house.
                                    </div>
                                </li>
                                <li class="flex items-start gap-3">
                                    <div class="mt-1 bg-zinc-800 p-1.5 rounded text-magenta-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg></div>
                                    <div>
                                        <strong class="text-white block text-base mb-1">Labels (Output / Y)</strong>
                                        The thing you are trying to predict. E.g., The final sale price of that house.
                                    </div>
                                </li>
                            </ul>
                        </div>

                        <div class="note-card border-t-4 border-t-indigo-500">
                            <h3 class="text-xl font-semibold mb-3 text-white">The ML Pipeline</h3>
                            <p class="text-zinc-300 text-sm mb-4">Machine learning isn't just algorithms; it's a workflow. A typical data scientist spends 80% of their time on steps 1 and 2!</p>
                            <div class="flex flex-col gap-2">
                                <div class="bg-zinc-800/80 p-3 rounded flex items-center gap-3"><span class="bg-zinc-700 text-zinc-300 px-2 py-1 rounded text-xs font-mono">1</span> <span class="text-sm"><strong>Data Collection:</strong> Gathering raw data from databases, APIs, or files.</span></div>
                                <div class="bg-zinc-800/80 p-3 rounded flex items-center gap-3"><span class="bg-zinc-700 text-zinc-300 px-2 py-1 rounded text-xs font-mono">2</span> <span class="text-sm"><strong>Preprocessing:</strong> Handling missing values, encoding text to numbers, and scaling.</span></div>
                                <div class="bg-cyan-900/40 border border-cyan-800/50 p-3 rounded flex items-center gap-3"><span class="bg-cyan-800 text-cyan-200 px-2 py-1 rounded text-xs font-mono">3</span> <span class="text-sm"><strong>Training:</strong> Feeding the clean data into the algorithm to learn the pattern.</span></div>
                                <div class="bg-magenta-900/40 border border-magenta-800/50 p-3 rounded flex items-center gap-3"><span class="bg-magenta-800 text-magenta-200 px-2 py-1 rounded text-xs font-mono">4</span> <span class="text-sm"><strong>Evaluation:</strong> Testing the model on data it has <em>never</em> seen before.</span></div>
                                <div class="bg-zinc-800/80 p-3 rounded flex items-center gap-3"><span class="bg-zinc-700 text-zinc-300 px-2 py-1 rounded text-xs font-mono">5</span> <span class="text-sm"><strong>Inference:</strong> Deploying the model to make predictions in the real world.</span></div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 'math',
                title: '2. Coordinate Geometry',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />',
                accent: 'text-magenta-400',
                content: `
                    <div class="max-w-3xl mx-auto">
                        <h2 class="text-3xl font-bold mb-2">Distance & Geometry</h2>
                        <p class="text-zinc-400 text-lg mb-8">Essential for understanding <span class="text-magenta-400 font-semibold">K-Nearest Neighbors (KNN)</span>.</p>

                        <div class="note-card">
                            <h3 class="text-xl font-semibold mb-3 text-white">Representing Data as Points</h3>
                            <p class="text-zinc-300 text-sm leading-relaxed mb-4">
                                In ML, we turn features into numbers. If a patient has Age=45 and Blood Pressure=120, we can plot this as a coordinate point <strong>(45, 120)</strong> on a graph. To find similar patients, we just measure the distance between points!
                            </p>
                        </div>

                        <div class="note-card">
                            <h3 class="text-xl font-semibold mb-4 text-magenta-400">Measuring Distance</h3>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="bg-zinc-800/40 p-5 rounded-lg border border-zinc-700">
                                    <h4 class="font-bold text-white mb-2">Euclidean (L2)</h4>
                                    <p class="text-xs text-zinc-400 mb-3">The "as the crow flies" straight line.</p>
                                    <div class="font-mono text-xs text-magenta-300 bg-magenta-950/30 p-2 rounded text-center mb-4 border border-magenta-900/50">
                                        √((x₂-x₁)² + (y₂-y₁)²)
                                    </div>
                                    <div class="w-full h-24 bg-zinc-900 rounded border border-zinc-700 relative overflow-hidden flex items-center justify-center">
                                        <svg width="100" height="60" viewBox="0 0 100 60">
                                            <circle cx="20" cy="40" r="4" fill="#d946ef"/>
                                            <circle cx="80" cy="20" r="4" fill="#d946ef"/>
                                            <line x1="20" y1="40" x2="80" y2="20" stroke="#d946ef" stroke-width="2" stroke-dasharray="4"/>
                                        </svg>
                                    </div>
                                </div>
                                
                                <div class="bg-zinc-800/40 p-5 rounded-lg border border-zinc-700">
                                    <h4 class="font-bold text-white mb-2">Manhattan (L1)</h4>
                                    <p class="text-xs text-zinc-400 mb-3">The "city block" grid distance.</p>
                                    <div class="font-mono text-xs text-cyan-300 bg-cyan-950/30 p-2 rounded text-center mb-4 border border-cyan-900/50">
                                        |x₂-x₁| + |y₂-y₁|
                                    </div>
                                    <div class="w-full h-24 bg-zinc-900 rounded border border-zinc-700 relative overflow-hidden flex items-center justify-center">
                                        <svg width="100" height="60" viewBox="0 0 100 60">
                                            <circle cx="20" cy="40" r="4" fill="#06b6d4"/>
                                            <circle cx="80" cy="20" r="4" fill="#06b6d4"/>
                                            <polyline points="20,40 80,40 80,20" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Interactive Demo -->
                        <div class="mt-6 p-5 bg-zinc-900 border border-zinc-700 rounded-lg shadow-inner">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-sm font-bold text-white uppercase tracking-wider">Interactive: Point B Position</h4>
                            </div>
                            <label class="text-xs text-zinc-400 block mb-2">Move Point B on the X-axis</label>
                            <input type="range" id="math-slider" min="0" max="10" value="4">
                            <div class="flex justify-between mt-4 text-sm font-mono bg-black p-3 rounded border border-zinc-800">
                                <div><span class="text-zinc-500">Point A:</span> (0, 0)</div>
                                <div><span class="text-zinc-500">Point B:</span> (<span id="math-x-val" class="text-white">4</span>, 3)</div>
                            </div>
                            <div class="flex justify-between mt-2 text-sm font-mono">
                                <div class="text-magenta-400">Euclidean Dist: <span id="math-euc">5.0</span></div>
                                <div class="text-cyan-400">Manhattan Dist: <span id="math-man">7</span></div>
                            </div>
                        </div>

                        <div class="note-card mt-6 border-t-4 border-t-yellow-500">
                            <h3 class="text-xl font-semibold mb-3 text-white">The Need for Scaling</h3>
                            <p class="text-zinc-300 text-sm mb-3">
                                Imagine measuring distance between two people using <strong>Age</strong> (0-100 years) and <strong>Income</strong> ($0-$200,000). Because Income numbers are thousands of times larger, the distance formula will completely ignore Age!
                            </p>
                            <div class="bg-zinc-800/80 p-4 rounded border border-zinc-700 text-sm text-zinc-300">
                                <strong class="text-yellow-400 block mb-1">Feature Normalization / Standardization</strong> 
                                Before calculating distance, Data Scientists mathematically squash all features to be on the same scale (e.g., between 0 and 1, or centered around 0 with a standard deviation of 1). This ensures every feature gets an equal vote.
                            </div>
                        </div>
                    </div>
                `,
                onRender: () => {
                    const slider = document.getElementById('math-slider');
                    const xVal = document.getElementById('math-x-val');
                    const euc = document.getElementById('math-euc');
                    const man = document.getElementById('math-man');
                    
                    if(slider) {
                        slider.addEventListener('input', (e) => {
                            const x = parseInt(e.target.value);
                            const y = 3; // Fixed Y for demo
                            xVal.textContent = x;
                            euc.textContent = Math.sqrt(x*x + y*y).toFixed(1);
                            man.textContent = Math.abs(x) + Math.abs(y);
                        });
                    }
                }
            },
            {
                id: 'learning',
                title: '3. Types of Learning',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />',
                accent: 'text-yellow-400',
                content: `
                    <div class="max-w-3xl mx-auto">
                        <h2 class="text-3xl font-bold mb-2">How Algorithms Learn</h2>
                        <p class="text-zinc-400 text-lg mb-8">Understanding the difference prepares you for <span class="text-yellow-400 font-semibold">K-Means Clustering</span>.</p>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <!-- Supervised -->
                            <div class="note-card !mb-0 border-t-4 border-t-emerald-500 flex flex-col">
                                <h3 class="text-xl font-bold mb-2 text-white">Supervised Learning</h3>
                                <p class="text-sm text-zinc-400 mb-4 flex-1">The algorithm is trained on data that already has the "answers" (labels) attached.</p>
                                
                                <div class="bg-black/50 p-3 rounded mb-4">
                                    <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Sub-types</div>
                                    <ul class="text-sm space-y-3">
                                        <li><strong class="text-emerald-400 block">Classification:</strong> Predicting a distinct category. (e.g., Dog vs Cat, Spam vs Not Spam).</li>
                                        <li><strong class="text-emerald-400 block">Regression:</strong> Predicting a continuous number. (e.g., Price of a house, Tomorrow's Temperature).</li>
                                    </ul>
                                </div>
                                <div class="text-xs text-zinc-500 italic mt-auto">Think of it like a teacher grading your test and showing you the correct answers.</div>
                            </div>

                            <!-- Unsupervised -->
                            <div class="note-card !mb-0 border-t-4 border-t-yellow-500 flex flex-col">
                                <h3 class="text-xl font-bold mb-2 text-white">Unsupervised Learning</h3>
                                <p class="text-sm text-zinc-400 mb-4 flex-1">The algorithm is given raw data with no labels. It must find hidden patterns on its own.</p>
                                
                                <div class="bg-black/50 p-3 rounded mb-4">
                                    <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Sub-types</div>
                                    <ul class="text-sm space-y-3">
                                        <li><strong class="text-yellow-400 block">Clustering:</strong> Grouping similar data points together (e.g., Customer Segmentation). <span class="text-xs text-zinc-400 italic block mt-1">-> This is what K-Means does!</span></li>
                                        <li><strong class="text-yellow-400 block">Dimensionality Reduction:</strong> Compressing data while keeping its structure.</li>
                                    </ul>
                                </div>
                                <div class="text-xs text-zinc-500 italic mt-auto">Think of it like sorting a giant pile of mixed Lego bricks into groups by color or shape without instructions.</div>
                            </div>
                        </div>

                        <!-- Reinforcement Learning -->
                        <div class="note-card border-t-4 border-t-indigo-500">
                            <h3 class="text-xl font-bold mb-2 text-white">Reinforcement Learning</h3>
                            <p class="text-sm text-zinc-300 mb-4">An agent learns to make decisions by performing actions in an environment to maximize a reward. There is no predefined data; the algorithm learns by trial and error.</p>
                            <div class="flex gap-4 text-sm text-zinc-400 items-center">
                                <div class="bg-zinc-800 p-2 rounded shrink-0">🤖 Agent</div>
                                <div class="hidden sm:block text-indigo-400">→ acts in →</div>
                                <div class="bg-zinc-800 p-2 rounded shrink-0">🌍 Environment</div>
                                <div class="hidden sm:block text-indigo-400">→ receives →</div>
                                <div class="bg-zinc-800 p-2 rounded shrink-0">🪙 Reward / Penalty</div>
                            </div>
                            <p class="text-xs text-zinc-500 italic mt-4">Used heavily in Robotics, self-driving cars, and game-playing AI (like AlphaGo).</p>
                        </div>
                    </div>
                `
            },
            {
                id: 'fitting',
                title: '4. Model Fitting',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />',
                accent: 'text-cyan-400',
                content: `
                    <div class="max-w-3xl mx-auto">
                        <h2 class="text-3xl font-bold mb-2">Finding the Pattern</h2>
                        <p class="text-zinc-400 text-lg mb-8">Crucial for understanding <span class="text-cyan-400 font-semibold">Bias vs. Variance</span> & <span class="text-emerald-400 font-semibold">Decision Boundaries</span>.</p>

                        <div class="note-card">
                            <h3 class="text-xl font-semibold mb-3 text-white">Signal vs. Noise</h3>
                            <p class="text-zinc-300 text-sm leading-relaxed mb-4">
                                Real-world data is messy. <strong>Signal</strong> is the true underlying pattern. <strong>Noise</strong> is random variation or errors in the data. The goal of ML is to learn the signal and ignore the noise.
                            </p>
                        </div>

                        <div class="note-card">
                            <h3 class="text-xl font-semibold mb-4 text-cyan-400">The Goldilocks Problem</h3>
                            
                            <div class="space-y-6">
                                <!-- Underfitting -->
                                <div class="flex flex-col sm:flex-row gap-4 items-center">
                                    <div class="w-32 h-20 bg-zinc-800 rounded-lg border border-zinc-700 flex items-center justify-center shrink-0">
                                        <svg width="80" height="40" viewBox="0 0 80 40">
                                            <!-- Data points forming a curve -->
                                            <circle cx="10" cy="30" r="2" fill="#71717a"/>
                                            <circle cx="30" cy="10" r="2" fill="#71717a"/>
                                            <circle cx="50" cy="15" r="2" fill="#71717a"/>
                                            <circle cx="70" cy="35" r="2" fill="#71717a"/>
                                            <!-- Linear Line -->
                                            <line x1="5" y1="20" x2="75" y2="20" stroke="#ef4444" stroke-width="2"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-red-400">1. Underfitting (High Bias)</h4>
                                        <p class="text-xs text-zinc-400 mt-1">The model is too simple. It completely misses the pattern. Example: Trying to use a straight line to map a curved relationship.</p>
                                    </div>
                                </div>

                                <!-- Good Fit -->
                                <div class="flex flex-col sm:flex-row gap-4 items-center">
                                    <div class="w-32 h-20 bg-zinc-800 rounded-lg border border-zinc-700 flex items-center justify-center shrink-0">
                                        <svg width="80" height="40" viewBox="0 0 80 40">
                                            <!-- Data points -->
                                            <circle cx="10" cy="30" r="2" fill="#71717a"/>
                                            <circle cx="30" cy="10" r="2" fill="#71717a"/>
                                            <circle cx="50" cy="15" r="2" fill="#71717a"/>
                                            <circle cx="70" cy="35" r="2" fill="#71717a"/>
                                            <!-- Smooth Curve -->
                                            <path d="M 5 35 Q 30 -5 50 15 T 75 40" fill="none" stroke="#10b981" stroke-width="2"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-emerald-400">2. Good Fit (Balanced)</h4>
                                        <p class="text-xs text-zinc-400 mt-1">The model captures the general trend (signal) but ignores the minor random fluctuations (noise).</p>
                                    </div>
                                </div>

                                <!-- Overfitting -->
                                <div class="flex flex-col sm:flex-row gap-4 items-center">
                                    <div class="w-32 h-20 bg-zinc-800 rounded-lg border border-zinc-700 flex items-center justify-center shrink-0">
                                        <svg width="80" height="40" viewBox="0 0 80 40">
                                            <!-- Data points -->
                                            <circle cx="10" cy="30" r="2" fill="#71717a"/>
                                            <circle cx="30" cy="10" r="2" fill="#71717a"/>
                                            <circle cx="50" cy="15" r="2" fill="#71717a"/>
                                            <circle cx="70" cy="35" r="2" fill="#71717a"/>
                                            <!-- Jagged Line -->
                                            <polyline points="5,35 10,30 20,25 30,10 40,20 50,15 60,30 70,35 75,25" fill="none" stroke="#d946ef" stroke-width="2"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-magenta-400">3. Overfitting (High Variance)</h4>
                                        <p class="text-xs text-zinc-400 mt-1">The model is too complex. It memorizes the exact data points, including the noise. It will perform terribly on new, unseen data.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="note-card border-t-4 border-t-emerald-500">
                            <h3 class="text-xl font-semibold mb-3 text-white">How to Detect Overfitting: Data Splitting</h3>
                            <p class="text-zinc-300 text-sm leading-relaxed mb-4">
                                If an overfit model perfectly memorizes the data, it will score 100% accuracy. To catch this, we <strong>hide</strong> a portion of the data during training!
                            </p>
                            <div class="flex gap-1 h-10 w-full rounded overflow-hidden mb-3">
                                <div class="bg-cyan-700 w-[70%] flex flex-col items-center justify-center text-xs text-white">
                                    <strong class="font-bold">Training Set (70%)</strong>
                                    <span class="text-[10px] opacity-70">Model learns from this</span>
                                </div>
                                <div class="bg-indigo-600 w-[15%] flex flex-col items-center justify-center text-xs text-white">
                                    <strong class="font-bold">Validation</strong>
                                    <span class="text-[10px] opacity-70">For tuning</span>
                                </div>
                                <div class="bg-magenta-600 w-[15%] flex flex-col items-center justify-center text-xs text-white">
                                    <strong class="font-bold">Test Set</strong>
                                    <span class="text-[10px] opacity-70">Final exam</span>
                                </div>
                            </div>
                            <p class="text-xs text-zinc-400 mt-2 bg-zinc-800 p-3 rounded">
                                <strong>Rule of Thumb:</strong> If your model is 98% accurate on the Training Set, but only 60% accurate on the Test Set, congratulations—you have <span class="text-magenta-400 font-bold">High Variance (Overfitting)</span>!
                            </p>
                        </div>
                    </div>
                `
            },
            {
                id: 'eval',
                title: '5. Evaluation Metrics',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />',
                accent: 'text-indigo-400',
                content: `
                    <div class="max-w-3xl mx-auto">
                        <h2 class="text-3xl font-bold mb-2">Measuring Success</h2>
                        <p class="text-zinc-400 text-lg mb-8">How do we mathematically prove our model is good?</p>
                        
                        <div class="note-card border-t-4 border-t-emerald-500">
                            <h3 class="text-xl font-bold mb-2 text-white">Classification Metrics</h3>
                            <p class="text-sm text-zinc-300 mb-4">Accuracy (Total Correct / Total Predictions) isn't always reliable. Imagine predicting a rare disease that affects 1% of people. A model that just prints "Healthy" every time is 99% accurate, but completely useless!</p>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
                                <div class="bg-zinc-800/80 p-4 rounded border border-zinc-700">
                                    <div class="text-emerald-400 font-bold mb-1 text-lg">Precision</div>
                                    <div class="text-sm text-zinc-300 mb-2">"When it predicts Positive, how often is it right?"</div>
                                    <div class="text-xs text-zinc-500">Crucial when <strong>False Positives</strong> are costly (e.g., Spam detection. You don't want a real email going to spam).</div>
                                </div>
                                <div class="bg-zinc-800/80 p-4 rounded border border-zinc-700">
                                    <div class="text-cyan-400 font-bold mb-1 text-lg">Recall (Sensitivity)</div>
                                    <div class="text-sm text-zinc-300 mb-2">"Out of all actual Positives, how many did we find?"</div>
                                    <div class="text-xs text-zinc-500">Crucial when <strong>False Negatives</strong> are costly (e.g., Cancer detection. Better to false-alarm than to miss it).</div>
                                </div>
                            </div>
                            <div class="bg-indigo-900/20 p-4 rounded border border-indigo-800/50 text-sm text-zinc-300 flex items-center gap-4">
                                <div class="text-3xl">⚖️</div>
                                <div>
                                    <strong class="text-indigo-400 block text-base">The F1-Score</strong> 
                                    The harmonic mean of Precision and Recall. It gives you a single metric to optimize when you want a balance between the two, especially on imbalanced datasets.
                                </div>
                            </div>
                        </div>

                        <div class="note-card border-t-4 border-t-yellow-500">
                            <h3 class="text-xl font-bold mb-4 text-white">Regression Metrics</h3>
                            <p class="text-sm text-zinc-300 mb-4">When predicting continuous numbers (like House Prices), we can't be exactly right. We measure how <em>far off</em> we are on average.</p>
                            <ul class="space-y-4 text-sm text-zinc-300">
                                <li class="bg-zinc-800/50 p-4 rounded border border-zinc-700">
                                    <strong class="text-yellow-400 block mb-1 text-base">Mean Absolute Error (MAE)</strong>
                                    The average of all absolute errors. Highly interpretable. <br>
                                    <em class="text-zinc-500 text-xs">Example: "Our house price model has an MAE of $5,000. It is off by $5k on average."</em>
                                </li>
                                <li class="bg-zinc-800/50 p-4 rounded border border-zinc-700">
                                    <strong class="text-yellow-400 block mb-1 text-base">Mean Squared Error (MSE)</strong>
                                    Squares the errors before averaging them. Because it squares the errors, it <strong>heavily penalizes large outliers</strong>. <br>
                                    <em class="text-zinc-500 text-xs">If being wrong by 10 is much worse than being wrong by 1 ten times, use MSE.</em>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="mt-8 bg-gradient-to-r from-cyan-900/40 to-blue-900/40 border border-cyan-800/50 p-6 rounded-xl text-center">
                            <h3 class="text-white font-bold mb-2 text-xl">Ready for the Workbench?</h3>
                            <p class="text-sm text-cyan-200 mb-6">You now have the mathematical and conceptual foundations required to experiment with algorithms like KNN and K-Means.</p>
                            <button class="bg-cyan-600 hover:bg-cyan-500 text-white px-8 py-3 rounded-lg font-bold transition-all shadow-lg shadow-cyan-600/30 hover:scale-105">
                                Launch 90-Minute Workbench
                            </button>
                        </div>
                    </div>
                `
            }
        ];

        let activeTopicId = topics[0].id;

        // DOM Elements
        const sidebarNav = document.getElementById('sidebar-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const contentArea = document.getElementById('content-area');

        function initApp() {
            // Build Navigation
            topics.forEach(topic => {
                // Desktop
                const btn = document.createElement('button');
                btn.className = `nav-btn w-full text-left px-6 py-3.5 flex items-center gap-3 text-zinc-400 font-medium ${topic.id === activeTopicId ? 'active' : ''}`;
                btn.innerHTML = `<svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">${topic.icon}</svg> ${topic.title}`;
                btn.onclick = () => loadTopic(topic.id);
                sidebarNav.appendChild(btn);
            });

            // Mobile select listener
            mobileNav.addEventListener('change', (e) => loadTopic(e.target.value));

            // Load initial
            loadTopic(activeTopicId);
        }

        function loadTopic(id) {
            activeTopicId = id;
            const topic = topics.find(t => t.id === id);

            // Update UI State
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.includes(topic.title)) {
                    btn.classList.add('active');
                }
            });
            mobileNav.value = id;

            // Render Content with a slight fade effect
            contentArea.style.opacity = '0';
            setTimeout(() => {
                contentArea.innerHTML = topic.content;
                contentArea.scrollTop = 0;
                contentArea.style.transition = 'opacity 0.3s ease';
                contentArea.style.opacity = '1';
                
                // Run topic-specific JS if it exists
                if(topic.onRender) {
                    topic.onRender();
                }
            }, 150);
        }

        // Initialize
        initApp();
    </script>
</body>
</html>
