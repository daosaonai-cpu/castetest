<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test MCQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            box-sizing: border-box;
        }
        .quiz-header {
            margin-bottom: 20px;
        }
        .quiz-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        ul li {
            font-size: 1rem;
            margin: 10px 0;
        }
        ul li label {
            display: flex;
            align-items: center;
            background-color: #f9fafb;
            padding: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        ul li label:hover {
            background-color: #e5e7eb;
        }
        input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            display: block;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: inherit;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #2563eb;
        }
        .score-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <div class="quiz-header">
        <h2 id="question">Question text</h2>
        <ul>
            <li>
                <label>
                    <input type="radio" name="answer" id="a" class="answer">
                    <span id="a_text">Option A</span>
                </label>
            </li>
            <li>
                <label>
                    <input type="radio" name="answer" id="b" class="answer">
                    <span id="b_text">Option B</span>
                </label>
            </li>
            <li>
                <label>
                    <input type="radio" name="answer" id="c" class="answer">
                    <span id="c_text">Option C</span>
                </label>
            </li>
            <li>
                <label>
                    <input type="radio" name="answer" id="d" class="answer">
                    <span id="d_text">Option D</span>
                </label>
            </li>
        </ul>
    </div>
    <button id="submit">Submit</button>
</div>

<script>
    // Note: The 'correct' answers provided below are inferred for functionality purposes. 
    // Please update them to match your official answer key if needed.
    const quizData = [
        {
            question: "1. In any written piece, the sentences of a paragraph should be woven together in such a way that they flow into each other. [cite: 2] This principle is called [cite: 3]",
            a: "A. Unity [cite: 4]",
            b: "B. Order [cite: 5]",
            c: "C. Conciseness [cite: 6]",
            d: "D. Coherence [cite: 7]",
            correct: "d",
        },
        {
            question: "2. In oral presentation outside your organisation you must first give the audience a [cite: 8] of your organization. [cite: 9]",
            a: "A. Flash back [cite: 10]",
            b: "B. Background [cite: 11]",
            c: "C. Front view [cite: 12]",
            d: "D. Forword view [cite: 13]",
            correct: "b",
        },
        {
            question: "3. ____ is the person who notices and decodes and attaches some meaning to a [cite: 14] message. [cite: 17]",
            a: "A. receiver [cite: 16]",
            b: "B. driver [cite: 18]",
            c: "C. sender [cite: 19]",
            d: "D. cleaner [cite: 20]",
            correct: "a",
        },
        {
            question: "4. which is the best communication channel is used when a persuasive, [cite: 21] well-considered message is required [cite: 22]",
            a: "A. E-Mail [cite: 23]",
            b: "B. Letter [cite: 24]",
            c: "C. Memo [cite: 25]",
            d: "D. Fax [cite: 26]",
            correct: "b",
        },
        {
            question: "5. Letters are a primary channel of communication for delivering messages [cite: 27]",
            a: "A. inside organisation [cite: 29]",
            b: "B. outside organisation [cite: 30]",
            c: "C. inside and outside an organisation [cite: 31]",
            d: "D. tha need to reach the recipient immediately [cite: 32]",
            correct: "b",
        },
        {
            question: "6. ____ means communication without words [cite: 33]",
            a: "A. Objective communication [cite: 34]",
            b: "B. Written communication [cite: 35]",
            c: "C. Oral communication [cite: 36]",
            d: "D. Non-verbal communication [cite: 37]",
            correct: "d",
        },
        {
            question: "7. The response to a sender's message is called [cite: 38]",
            a: "A. food bank [cite: 39]",
            b: "B. feedback [cite: 40]",
            c: "C. reply [cite: 41]",
            d: "D. back [cite: 42]",
            correct: "b",
        },
        {
            question: "8. Communication helps officials to ____ the employees. [cite: 43, 48]",
            a: "A. Eliminate [cite: 44]",
            b: "B. Motivate [cite: 45]",
            c: "C. Threaten [cite: 46]",
            d: "D. Apprise [cite: 47]",
            correct: "b",
        },
        {
            question: "9. A holiday is declared in organizations by [cite: 49]",
            a: "A. a notice [cite: 50]",
            b: "B. a circular [cite: 51]",
            c: "C. a memo [cite: 52]",
            d: "D. an instruction sheet [cite: 53]",
            correct: "b",
        },
        {
            question: "10. Body language, body posture, and hand gestures are examples of ____ communication [cite: 54, 55]",
            a: "A. Informal communication [cite: 56]",
            b: "B. Non-verbal communication [cite: 57]",
            c: "C. Verbal communication [cite: 58]",
            d: "D. Formal communication [cite: 59]",
            correct: "b",
        }
        // Add questions 11 through 100 here following the same object format.
    ];

    const quiz = document.getElementById('quiz');
    const answerEls = document.querySelectorAll('.answer');
    const questionEl = document.getElementById('question');
    const a_text = document.getElementById('a_text');
    const b_text = document.getElementById('b_text');
    const c_text = document.getElementById('c_text');
    const d_text = document.getElementById('d_text');
    const submitBtn = document.getElementById('submit');

    let currentQuiz = 0;
    let score = 0;

    loadQuiz();

    function loadQuiz() {
        deselectAnswers();

        const currentQuizData = quizData[currentQuiz];

        questionEl.innerText = currentQuizData.question;
        a_text.innerText = currentQuizData.a;
        b_text.innerText = currentQuizData.b;
        c_text.innerText = currentQuizData.c;
        d_text.innerText = currentQuizData.d;
    }

    function deselectAnswers() {
        answerEls.forEach(answerEl => answerEl.checked = false);
    }

    function getSelected() {
        let answer;
        answerEls.forEach(answerEl => {
            if(answerEl.checked) {
                answer = answerEl.id;
            }
        });
        return answer;
    }

    submitBtn.addEventListener('click', () => {
        const answer = getSelected();

        if(answer) {
            if(answer === quizData[currentQuiz].correct) {
                score++;
            }

            currentQuiz++;

            if(currentQuiz < quizData.length) {
                loadQuiz();
            } else {
                quiz.innerHTML = `
                    <div class="score-display">
                        You answered ${score}/${quizData.length} questions correctly.
                    </div>
                    <button onclick="location.reload()">Reload Quiz</button>
                `;
            }
        } else {
            alert('Please select an option before submitting!');
        }
    });
</script>

</body>
</html>
