<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Machine Learning Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            background-color: #1e293b;
            border-radius: 0.75rem;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.1);
            cursor: crosshair;
            touch-action: none;
        }

        .slide-enter {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #475569;
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }
        
        .class-btn.active-0 { background-color: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .class-btn.active-1 { background-color: #f97316; border-color: #fb923c; box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        
        /* Grid pattern for canvas background */
        .canvas-container {
            position: relative;
        }
        .canvas-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header / Navigation -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center shadow-md shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-white shadow-lg">
                ML
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
                Interactive ML Lab
            </h1>
        </div>
        
        <div class="flex items-center gap-4">
            <span id="slide-counter" class="text-slate-400 text-sm font-medium">Slide 1 / 6</span>
            <div class="flex gap-2">
                <button id="btn-prev" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Prev
                </button>
                <button id="btn-next" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-medium shadow-lg shadow-blue-500/20 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    Next
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Panel: Educational Content -->
        <div class="w-1/3 bg-slate-800/50 p-8 overflow-y-auto border-r border-slate-700 flex flex-col slide-enter" id="text-panel">
            <span id="slide-label" class="text-blue-400 font-semibold tracking-wider text-xs uppercase mb-2">Introduction</span>
            <h2 id="slide-title" class="text-3xl font-bold mb-4 text-white">Welcome to Machine Learning</h2>
            
            <div id="slide-content" class="text-slate-300 space-y-4 leading-relaxed flex-1">
                <!-- Content injected via JS -->
            </div>

            <div id="class-activity" class="mt-8 p-4 bg-blue-900/20 border border-blue-500/30 rounded-lg">
                <h4 class="text-blue-400 font-semibold text-sm mb-2 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Class Activity
                </h4>
                <p id="activity-text" class="text-sm text-blue-100/80">
                    Listen to the instructor's introduction.
                </p>
            </div>
        </div>

        <!-- Right Panel: Interactive Canvas -->
        <div class="w-2/3 p-6 flex flex-col bg-slate-900">
            
            <!-- Controls Overlay (Dynamic based on slide) -->
            <div id="canvas-controls" class="h-14 mb-4 flex items-center justify-between opacity-0 transition-opacity">
                
                <!-- Classification Tools -->
                <div id="tool-classification" class="hidden flex gap-3 p-1 bg-slate-800 rounded-lg border border-slate-700">
                    <button class="class-btn active-0 px-4 py-1.5 rounded-md text-sm font-medium border border-transparent transition-all" data-class="0">
                        Class A (Blue)
                    </button>
                    <button class="class-btn px-4 py-1.5 rounded-md text-sm font-medium border border-transparent transition-all text-slate-400 hover:text-white" data-class="1">
                        Class B (Orange)
                    </button>
                </div>

                <!-- KNN Slider -->
                <div id="tool-knn" class="hidden flex-1 max-w-md ml-4 flex items-center gap-4 bg-slate-800 py-2 px-4 rounded-lg border border-slate-700">
                    <label class="text-sm font-medium text-slate-300 whitespace-nowrap">K Value: <span id="k-value-display" class="text-blue-400 font-bold">3</span></label>
                    <input type="range" id="knn-slider" min="1" max="15" step="2" value="3">
                    <span class="text-xs text-slate-500 w-24 text-right" id="k-status">Balanced</span>
                </div>

                <!-- Stats Display -->
                <div id="stats-display" class="hidden flex items-center gap-4 px-4 py-2 bg-slate-800 rounded-lg border border-slate-700">
                    <div class="text-sm">
                        <span class="text-slate-400">Error (MSE):</span>
                        <span id="mse-value" class="font-mono font-bold text-red-400 ml-1">0.00</span>
                    </div>
                </div>

                <!-- Global Canvas Actions -->
                <button id="btn-clear" class="ml-auto px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded text-sm font-medium text-red-400 hover:text-red-300 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear Data
                </button>
            </div>

            <!-- Canvas Container -->
            <div class="flex-1 canvas-container w-full h-full" id="canvas-wrapper">
                <div class="canvas-grid"></div>
                <canvas id="ml-canvas" class="w-full h-full block"></canvas>
                
                <!-- Initial empty state overlay -->
                <div id="canvas-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="text-center bg-slate-900/80 p-6 rounded-xl backdrop-blur-sm border border-slate-700 shadow-2xl">
                        <svg class="w-12 h-12 text-blue-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                        <p class="text-lg font-medium text-white mb-1">Interactive Sandbox Area</p>
                        <p class="text-slate-400 text-sm">Follow the instructions on the left to begin.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * Machine Learning Interactive Lab Logic
         */

        // --- Data & State Management ---
        const state = {
            currentSlide: 0,
            points: [], // {x, y, class}
            activeClass: 0, // 0 or 1
            knnK: 3,
            isDragging: false,
            dragIndex: -1,
            mode: 'none', // 'regression', 'classification', 'knn'
        };

        const slides = [
            {
                label: "Module 1",
                title: "What is Machine Learning?",
                content: `
                    <p>Traditional programming requires humans to write explicit rules (code) that take data and produce answers.</p>
                    <div class="bg-slate-700/30 p-4 rounded-lg border border-slate-600/50 my-2">
                        <span class="text-blue-400 font-mono text-sm">Rules + Data = Answers</span>
                    </div>
                    <p><strong>Machine Learning</strong> flips this. We provide the computer with data and the correct answers, and the computer learns the rules.</p>
                    <div class="bg-slate-700/30 p-4 rounded-lg border border-slate-600/50 my-2">
                        <span class="text-green-400 font-mono text-sm">Answers + Data = Rules</span>
                    </div>
                    <p>Today, we will build an intuition for how algorithms discover these rules by visualizing them in real-time.</p>
                `,
                activity: "No interaction required. Prepare for the next slide where we will create our first model.",
                mode: 'none',
                setup: () => state.points = []
            },
            {
                label: "Module 2",
                title: "Linear Regression",
                content: `
                    <p>Imagine you want to predict house prices based on square footage. If we plot this data, we can draw a straight line through it to predict future prices.</p>
                    <p>This is <strong>Linear Regression</strong>. The algorithm tries to find the "Line of Best Fit" that minimizes the distance between the line and all the data points.</p>
                    <ul class="list-disc pl-5 text-sm space-y-2 text-slate-400 mt-4">
                        <li>The algorithm calculates the error (Mean Squared Error).</li>
                        <li>It adjusts the slope and position of the line to make this error as close to zero as possible.</li>
                    </ul>
                `,
                activity: "Click on the grid to the right to add data points. Try creating a diagonal trend (e.g., bottom-left to top-right) and watch the model calculate the line of best fit instantly.",
                mode: 'regression',
                setup: () => state.points = []
            },
            {
                label: "Module 3",
                title: "The Impact of Outliers",
                content: `
                    <p>A model is only as good as its data. What happens when we have anomalies or "outliers"?</p>
                    <p>Because Standard Linear Regression minimizes the <em>squared</em> error, data points that are very far away from the line are penalized heavily. The line will bend significantly to accommodate them.</p>
                    <p>In the real world, cleaning data to remove these outliers is a massive part of a Data Scientist's job.</p>
                `,
                activity: "I've added a perfect straight line of points. Click and DRAG one of the points far away from the others. Watch how a single outlier drags the entire model down with it.",
                mode: 'regression',
                setup: (width, height) => {
                    state.points = [];
                    // Generate a nice diagonal line
                    for(let i=1; i<=6; i++) {
                        state.points.push({
                            x: width * 0.15 * i,
                            y: height - (height * 0.12 * i)
                        });
                    }
                }
            },
            {
                label: "Module 4",
                title: "Classification",
                content: `
                    <p>Regression predicts continuous numbers (like price). <strong>Classification</strong> predicts categories (like "Spam" or "Not Spam").</p>
                    <p>Instead of drawing a line <em>through</em> the data, classification algorithms draw a <strong>Decision Boundary</strong> to separate the groups.</p>
                    <p>Any new data point that falls on one side of the boundary is classified as Blue; on the other side, Orange.</p>
                `,
                activity: "Add some Blue points (Class A) on one side of the canvas, and Orange points (Class B) on the other. Use the toggle buttons above the canvas to switch colors.",
                mode: 'classification',
                setup: () => state.points = []
            },
            {
                label: "Module 5",
                title: "Overfitting & K-Nearest Neighbors",
                content: `
                    <p>A popular classification algorithm is <strong>K-Nearest Neighbors (K-NN)</strong>. To classify a new point, it looks at its 'K' closest neighbors and takes a majority vote.</p>
                    <p class="text-blue-300"><strong>The Bias-Variance Tradeoff:</strong></p>
                    <ul class="list-disc pl-5 text-sm space-y-2 text-slate-400 mt-2">
                        <li><strong>Low K (e.g., K=1):</strong> The boundary becomes highly jagged. It perfectly memorizes the training data, including noise. This is called <strong>Overfitting</strong>.</li>
                        <li><strong>High K (e.g., K=15):</strong> The boundary becomes a smooth line. It might miss nuances. This is called <strong>Underfitting</strong>.</li>
                    </ul>
                `,
                activity: "Create a complex cluster of blue and orange points. Then, drag the 'K Value' slider above the canvas. Notice how K=1 creates 'islands' around individual points, while higher K values smooth it out.",
                mode: 'knn',
                setup: (width, height) => {
                    // Start with a cluster to save time
                    state.points = [];
                    // Blue top left
                    for(let i=0; i<8; i++) state.points.push({x: width*0.3 + (Math.random()-0.5)*100, y: height*0.3 + (Math.random()-0.5)*100, class: 0});
                    // Orange bottom right
                    for(let i=0; i<8; i++) state.points.push({x: width*0.7 + (Math.random()-0.5)*100, y: height*0.7 + (Math.random()-0.5)*100, class: 1});
                    // A noisy blue in orange territory
                    state.points.push({x: width*0.65, y: height*0.65, class: 0});
                    state.knnK = 1;
                    document.getElementById('knn-slider').value = 1;
                    updateKStatus();
                }
            },
            {
                label: "Module 6",
                title: "Open Playground",
                content: `
                    <p>You've learned the fundamentals of how machines learn patterns from data:</p>
                    <ol class="list-decimal pl-5 text-sm space-y-2 text-slate-300 mt-4 mb-4 font-medium">
                        <li>Models use data to infer rules.</li>
                        <li>Regression finds trends (lines).</li>
                        <li>Classification separates categories (boundaries).</li>
                        <li>Outliers skew results.</li>
                        <li>Model complexity (like K) must be balanced to avoid Overfitting.</li>
                    </ol>
                    <p>This sandbox is open. Experiment with extreme data distributions and see how the K-NN algorithm behaves.</p>
                `,
                activity: "Class challenge: Try to create a 'bullseye' pattern (blue points in the center, orange surrounding them). What K value works best to generalize the boundary?",
                mode: 'knn',
                setup: () => state.points = []
            }
        ];

        // --- DOM Elements ---
        const canvas = document.getElementById('ml-canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        const overlay = document.getElementById('canvas-overlay');
        
        // Navigation
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const slideCounter = document.getElementById('slide-counter');
        
        // Content
        const slideLabel = document.getElementById('slide-label');
        const slideTitle = document.getElementById('slide-title');
        const slideContent = document.getElementById('slide-content');
        const activityText = document.getElementById('activity-text');
        const textPanel = document.getElementById('text-panel');
        
        // Tools
        const controlsContainer = document.getElementById('canvas-controls');
        const toolClassification = document.getElementById('tool-classification');
        const toolKnn = document.getElementById('tool-knn');
        const statsDisplay = document.getElementById('stats-display');
        const btnClear = document.getElementById('btn-clear');
        const classBtns = document.querySelectorAll('.class-btn');
        const knnSlider = document.getElementById('knn-slider');
        const kValueDisplay = document.getElementById('k-value-display');
        const kStatus = document.getElementById('k-status');
        const mseValue = document.getElementById('mse-value');

        // --- Math & ML Logic ---

        // Simple Ordinary Least Squares
        function calculateLinearRegression(points) {
            if (points.length < 2) return null;
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
            let n = points.length;
            
            points.forEach(p => {
                sumX += p.x;
                sumY += p.y;
                sumXY += p.x * p.y;
                sumXX += p.x * p.x;
            });
            
            let denominator = (n * sumXX - sumX * sumX);
            if (denominator === 0) return { m: 0, b: sumY / n, mse: 0 }; // Vertical line case handling
            
            let m = (n * sumXY - sumX * sumY) / denominator;
            let b = (sumY - m * sumX) / n;
            
            // Calculate MSE mapping to screen space just for relative visualization
            let mse = 0;
            points.forEach(p => {
                let predictedY = m * p.x + b;
                let error = p.y - predictedY;
                // Normalize error scale slightly for UI
                mse += (error * error) / 1000; 
            });
            mse = mse / n;

            return { m, b, mse };
        }

        // K-Nearest Neighbors Classification
        function getKNNClass(x, y, points, k) {
            let distances = points.map(p => {
                return {
                    distSq: (p.x - x)**2 + (p.y - y)**2,
                    class: p.class
                };
            });
            
            distances.sort((a, b) => a.distSq - b.distSq);
            
            let topK = distances.slice(0, k);
            let counts = {0: 0, 1: 0};
            topK.forEach(d => counts[d.class]++);
            
            return counts[0] > counts[1] ? 0 : 1;
        }

        // --- Canvas Rendering ---

        function resizeCanvas() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            draw();
        }

        const colors = {
            class0: { main: '#3b82f6', bg: 'rgba(59, 130, 246, 0.15)' }, // Blue
            class1: { main: '#f97316', bg: 'rgba(249, 115, 22, 0.15)' }, // Orange
            line: '#10b981', // Emerald
            pointStroke: '#ffffff'
        };

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state.mode === 'none') {
                overlay.style.opacity = '1';
                return;
            } else {
                overlay.style.opacity = state.points.length === 0 ? '1' : '0';
            }

            // Draw Backgrounds (Decision Boundaries)
            if ((state.mode === 'classification' || state.mode === 'knn') && state.points.length > 0) {
                // Check if we have both classes
                let has0 = state.points.some(p => p.class === 0);
                let has1 = state.points.some(p => p.class === 1);
                
                if (has0 && has1) {
                    drawDecisionBoundary();
                }
            }

            // Draw Regression Line
            if (state.mode === 'regression') {
                const reg = calculateLinearRegression(state.points);
                if (reg) {
                    ctx.beginPath();
                    // y = mx + b. Calculate y for x=0 and x=width
                    let y1 = reg.m * 0 + reg.b;
                    let y2 = reg.m * canvas.width + reg.b;
                    
                    ctx.moveTo(0, y1);
                    ctx.lineTo(canvas.width, y2);
                    ctx.strokeStyle = colors.line;
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    // Draw residual lines
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 1;
                    state.points.forEach(p => {
                        let predY = reg.m * p.x + reg.b;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x, predY);
                    });
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Update UI stats
                    mseValue.textContent = reg.mse.toFixed(2);
                } else {
                    mseValue.textContent = "0.00";
                }
            }

            // Draw Points
            state.points.forEach((p, index) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, index === state.dragIndex ? 8 : 6, 0, Math.PI * 2);
                
                if (state.mode === 'regression') {
                    ctx.fillStyle = colors.class0.main;
                } else {
                    ctx.fillStyle = p.class === 0 ? colors.class0.main : colors.class1.main;
                }
                
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = colors.pointStroke;
                ctx.stroke();

                // Glow effect if dragging
                if (index === state.dragIndex) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
                    ctx.fillStyle = state.mode === 'regression' ? 'rgba(59, 130, 246, 0.3)' : (p.class === 0 ? 'rgba(59, 130, 246, 0.3)' : 'rgba(249, 115, 22, 0.3)');
                    ctx.fill();
                }
            });
        }

        // Optimized rendering of the decision boundary using low-res blocks
        function drawDecisionBoundary() {
            const blockSize = 15; // Pixel size of evaluation blocks (tradeoff between quality/performance)
            const cols = Math.ceil(canvas.width / blockSize);
            const rows = Math.ceil(canvas.height / blockSize);
            
            // Limit K to max available points to avoid errors
            const actualK = Math.min(state.knnK, state.points.length);

            // Optimization: If K is large and points are many, drawing can lag. 
            // The block size approach handles this well for JS.
            ctx.globalAlpha = 0.6;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    let cx = i * blockSize + blockSize/2;
                    let cy = j * blockSize + blockSize/2;
                    
                    let predictedClass = getKNNClass(cx, cy, state.points, actualK);
                    
                    ctx.fillStyle = predictedClass === 0 ? colors.class0.bg : colors.class1.bg;
                    ctx.fillRect(i * blockSize, j * blockSize, blockSize, blockSize);
                }
            }
            ctx.globalAlpha = 1.0;
        }

        // --- Interaction Logic ---

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: evt.clientX - rect.left,
                y: evt.clientY - rect.top
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (state.mode === 'none') return;
            const pos = getMousePos(e);
            
            // Check if clicking near an existing point (for dragging)
            let clickedExisting = false;
            for (let i = state.points.length - 1; i >= 0; i--) {
                const p = state.points[i];
                const dist = Math.sqrt((p.x - pos.x)**2 + (p.y - pos.y)**2);
                if (dist < 15) { // Hitbox radius
                    state.isDragging = true;
                    state.dragIndex = i;
                    clickedExisting = true;
                    break;
                }
            }

            // If not dragging, add a new point
            if (!clickedExisting) {
                state.points.push({
                    x: pos.x,
                    y: pos.y,
                    class: state.mode === 'regression' ? 0 : state.activeClass
                });
            }
            
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (state.mode === 'none') return;
            const pos = getMousePos(e);
            
            // Change cursor based on hover
            let hover = false;
            for (let p of state.points) {
                if (Math.sqrt((p.x - pos.x)**2 + (p.y - pos.y)**2) < 15) {
                    hover = true; break;
                }
            }
            canvas.style.cursor = hover ? 'grab' : 'crosshair';

            if (state.isDragging && state.dragIndex > -1) {
                canvas.style.cursor = 'grabbing';
                state.points[state.dragIndex].x = pos.x;
                state.points[state.dragIndex].y = pos.y;
                
                // Fast redraw. For heavy KNN, we might need a debounce, but 15px blocks usually handle real-time fine.
                requestAnimationFrame(draw);
            }
        });

        window.addEventListener('mouseup', () => {
            state.isDragging = false;
            state.dragIndex = -1;
            draw();
        });

        // Touch support for mobile/tablets
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            window.dispatchEvent(new Event('mouseup'));
        });


        // --- UI & State Management ---

        function updateSlideUI() {
            const slide = slides[state.currentSlide];
            
            // Trigger animation
            textPanel.classList.remove('slide-enter');
            void textPanel.offsetWidth; // Trigger reflow
            textPanel.classList.add('slide-enter');

            slideLabel.textContent = slide.label;
            slideTitle.textContent = slide.title;
            slideContent.innerHTML = slide.content;
            activityText.textContent = slide.activity;
            slideCounter.textContent = `Slide ${state.currentSlide + 1} / ${slides.length}`;

            btnPrev.disabled = state.currentSlide === 0;
            btnNext.disabled = state.currentSlide === slides.length - 1;

            // Change App Mode
            state.mode = slide.mode;
            
            // Configure UI based on mode
            controlsContainer.style.opacity = state.mode === 'none' ? '0' : '1';
            controlsContainer.style.pointerEvents = state.mode === 'none' ? 'none' : 'auto';
            
            toolClassification.classList.add('hidden');
            toolKnn.classList.add('hidden');
            statsDisplay.classList.add('hidden');

            if (state.mode === 'regression') {
                statsDisplay.classList.remove('hidden');
            } else if (state.mode === 'classification') {
                toolClassification.classList.remove('hidden');
                // Standard classification will just use K=1 for rigid boundaries in this simple mode
                state.knnK = 1; 
            } else if (state.mode === 'knn') {
                toolClassification.classList.remove('hidden');
                toolKnn.classList.remove('hidden');
            }

            // Run setup function for the slide (injecting initial points)
            if (slide.setup) {
                slide.setup(canvas.width, canvas.height);
            }
            
            draw();
        }

        // Class toggle logic
        classBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cls = parseInt(e.target.dataset.class);
                state.activeClass = cls;
                
                classBtns.forEach(b => {
                    b.classList.remove('active-0', 'active-1', 'text-white');
                    b.classList.add('text-slate-400', 'border-transparent');
                });
                
                e.target.classList.remove('text-slate-400', 'border-transparent');
                e.target.classList.add(`active-${cls}`, 'text-white');
            });
        });

        // KNN Slider logic
        function updateKStatus() {
            const val = parseInt(knnSlider.value);
            state.knnK = val;
            kValueDisplay.textContent = val;
            
            if (val <= 3) {
                kStatus.textContent = "High Variance (Overfit)";
                kStatus.className = "text-xs w-36 text-right text-red-400";
            } else if (val >= 11) {
                kStatus.textContent = "High Bias (Underfit)";
                kStatus.className = "text-xs w-36 text-right text-orange-400";
            } else {
                kStatus.textContent = "Balanced";
                kStatus.className = "text-xs w-36 text-right text-green-400";
            }
            draw();
        }

        knnSlider.addEventListener('input', updateKStatus);

        // Global Clear
        btnClear.addEventListener('click', () => {
            state.points = [];
            draw();
        });

        // Slide Navigation
        btnNext.addEventListener('click', () => {
            if (state.currentSlide < slides.length - 1) {
                state.currentSlide++;
                updateSlideUI();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (state.currentSlide > 0) {
                state.currentSlide--;
                updateSlideUI();
            }
        });

        // Initialization
        window.addEventListener('resize', resizeCanvas);
        
        // Initial setup sequence
        setTimeout(() => {
            resizeCanvas();
            updateSlideUI();
        }, 100); // Small delay to let container calculate dimensions

    </script>
</body>
</html>
