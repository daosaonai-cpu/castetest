<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamy Vibes Cam</title>
    <style>
        :root {
            --bg-color: #1a1617;
            --text-color: #f7e8e8;
            --accent: #ff768b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: lowercase;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255, 180, 180, 0.3);
        }

        .cam-container {
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            background: #111;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255, 180, 150, 0.1);
        }

        canvas {
            width: 100%;
            max-width: 800px;
            background-color: #222;
            display: block;
            border-radius: 2px;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10; /* Keep above vignette */
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.9);
            color: var(--bg-color);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        #recordBtn.recording {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(255, 118, 139, 0.1);
            animation: breathe 2s infinite ease-in-out;
        }

        #recordBtn.recording:hover {
            background: var(--accent);
            color: #fff;
        }

        @keyframes breathe {
            0% { box-shadow: 0 0 0 0 rgba(255, 118, 139, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 118, 139, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 118, 139, 0); }
        }

        /* Soft warm vignette overlay instead of harsh CRT lines */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: radial-gradient(circle, rgba(255,230,210,0.03) 0%, rgba(20,10,15,0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>cinematic // rec</h1>

    <div class="cam-container">
        <video id="rawVideo" autoplay muted playsinline style="display:none;"></video>
        <canvas id="filterCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="recordBtn">Start Recording</button>
        <button id="switchBtn">Switch Camera</button>
    </div>

    <script>
        const video = document.getElementById('rawVideo');
        const canvas = document.getElementById('filterCanvas');
        const ctx = canvas.getContext('2d');
        const recordBtn = document.getElementById('recordBtn');
        const switchBtn = document.getElementById('switchBtn');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let rawStream;
        let currentFacingMode = 'user';

        async function initCamera() {
            if (rawStream) {
                rawStream.getTracks().forEach(track => track.stop());
            }

            try {
                const constraints = {
                    video: { facingMode: currentFacingMode },
                    audio: true
                };
                
                rawStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = rawStream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    if (!video.dataset.looping) {
                        video.dataset.looping = true;
                        requestAnimationFrame(drawFilteredFrame);
                    }
                };
            } catch (err) {
                alert("Could not access camera. Make sure you are on HTTPS or localhost, and allowed permissions.");
                console.error(err);
            }
        }

        function drawFilteredFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 1. Dreamy Cinematic Filter:
                // Boosted saturation for pastel colors, slight warmth (sepia), lower contrast for soft shadows, and a heavier blur for the "dreamy" bloom effect.
                ctx.filter = 'saturate(130%) contrast(95%) brightness(110%) sepia(20%) hue-rotate(-5deg) blur(1.2px)';
                
                if (currentFacingMode === 'user') {
                    ctx.save();
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    ctx.restore();
                } else {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }

                ctx.filter = 'none';

                // 3. Cinematic soft-glowing timestamp
                ctx.fillStyle = 'rgba(255, 240, 235, 0.85)';
                ctx.font = '300 22px "Helvetica Neue", Helvetica, Arial, sans-serif';
                ctx.shadowColor = "rgba(255, 180, 150, 0.6)";
                ctx.shadowBlur = 10; // Softer, wider glow
                
                const now = new Date();
                const dateString = now.toLocaleDateString().replace(/\//g, ' . ');
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                if (isRecording && Math.floor(Date.now() / 800) % 2 === 0) {
                    ctx.fillStyle = '#ff768b';
                    ctx.fillText('● REC', 30, 45);
                }
                
                ctx.fillStyle = 'rgba(255, 240, 235, 0.85)';
                ctx.fillText(`${dateString}   ${timeString}`, 30, canvas.height - 35);
                ctx.shadowBlur = 0; 
            }
            
            requestAnimationFrame(drawFilteredFrame);
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            recordedChunks = [];
            
            const canvasStream = canvas.captureStream(30);
            const audioTracks = rawStream.getAudioTracks();
            if (audioTracks.length > 0) {
                canvasStream.addTrack(audioTracks[0]);
            }

            mediaRecorder = new MediaRecorder(canvasStream, {
                mimeType: 'video/webm; codecs=vp9'
            });

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `dream-sequence-${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.textContent = "Stop Recording";
            recordBtn.classList.add("recording");
            switchBtn.disabled = true;
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.textContent = "Start Recording";
            recordBtn.classList.remove("recording");
            switchBtn.disabled = false;
        }

        function switchCamera() {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera();
        }

        recordBtn.addEventListener('click', toggleRecording);
        switchBtn.addEventListener('click', switchCamera);

        initCamera();
    </script>
</body>
</html>
