<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Main 2026 Physics Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for LaTeX Rendering -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden;
        }
        .slide-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-area {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }
        .question-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow-y: auto;
            border: 1px solid #e5e7eb;
        }
        .solving-panel {
            flex: 1.2;
            background: #ffffff;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .solving-panel::after {
            content: "Solving Area (Blank Space for Smart Board)";
            color: #94a3b8;
            font-weight: 600;
            font-size: 1.2rem;
            opacity: 0.3;
        }
        .nav-button {
            transition: all 0.2s;
        }
        .nav-button:active {
            transform: scale(0.95);
        }
        .option {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <!-- Header -->
    <header class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
        <div>
            <h1 class="text-xl font-bold">JEE-Main Exam Session-1 (January 2026)</h1>
            <p class="text-xs opacity-80 text-blue-100">Physics | Wednesday 21st Jan 2026 | Evening Shift</p>
        </div>
        <div class="text-right">
            <span id="slide-index" class="text-lg font-mono bg-blue-900 px-3 py-1 rounded">Q. 1 / 20</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="content-area">
        <div id="question-panel" class="question-panel">
            <!-- Question Content Injected Here -->
        </div>
        <div class="solving-panel" id="draw-area">
            <!-- Space left empty for smart board interaction -->
        </div>
    </div>

    <!-- Footer Controls -->
    <footer class="bg-white border-t p-4 flex justify-between items-center">
        <div class="flex gap-4">
            <button onclick="prevSlide()" class="nav-button bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded-lg">
                ← Previous
            </button>
            <button onclick="nextSlide()" class="nav-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg shadow-lg">
                Next Question →
            </button>
        </div>
        <div class="text-gray-500 italic text-sm">
            Use Arrow Keys to navigate
        </div>
    </footer>
</div>

<script>
    const questions = [
        {
            num: 26,
            text: "Consider two identical metallic spheres of radius R each having charge Q and mass m. Their centers have an initial separation of 4R. Both the spheres are given an initial speed of u towards each other. The minimum value of u, so that they can just touch each other is:<br><br>(Take $k=\\frac{1}{4\\pi~\\epsilon_{0}}$ and assume $kQ^{2}>Gm^{2}$ where G is the Gravitational constant)",
            options: [
                "(1) $\\sqrt{\\frac{kQ^{2}}{4mR}(1-\\frac{Gm^{2}}{kQ^{2}})}$",
                "(2) $\\sqrt{\\frac{kQ^{2}}{4mR}(1+\\frac{Gm^{2}}{kQ^{2}})}$",
                "(3) $\\sqrt{\\frac{kQ^{2}}{2mR}(1-\\frac{Gm^{2}}{kQ^{2}})}$",
                "(4) $\\sqrt{\\frac{kQ^{2}}{2mR}(1-\\frac{Gm^{2}}{2kQ^{2}})}$"
            ]
        },
        {
            num: 27,
            text: "The charge stored by the capacitor C in the given circuit in the steady state is ____ $\\mu C$.",
            options: [
                "(1) 12.5",
                "(2) 10",
                "(3) 7.5",
                "(4) 5"
            ]
        },
        {
            num: 28,
            text: "The total length of potentiometer wire AB is 50 cm in the arrangement as shown in figure. If P is the point where the galvanometer shows zero reading then the length AP is ____ cm.",
            options: [
                "(1) 15",
                "(2) 30",
                "(3) 25",
                "(4) 20"
            ]
        },
        {
            num: 29,
            text: "A capacitor C is first charged fully with potential difference of $V_{0}$ and disconnected from the battery. The charged capacitor is connected across an inductor having inductance L. In t seconds 25% of the initial energy in the capacitor is transferred to the inductor. The value of t is",
            options: [
                "(1) $\\frac{\\pi\\sqrt{LC}}{3}$",
                "(2) $\\frac{\\pi\\sqrt{LC}}{6}$",
                "(3) $\\frac{\\pi\\sqrt{LC}}{2}$",
                "(4) $\\pi\\sqrt{\\frac{LC}{2}}$"
            ]
        },
        {
            num: 30,
            text: "The r.m.s speed of oxygen molecules at 47°C is equal to that of the hydrogen molecules kept at ____ °C. (Mass of oxygen molecule/mass of hydrogen molecule $= 32/2$)",
            options: [
                "(1) -235",
                "(2) -100",
                "(3) -253",
                "(4) -20"
            ]
        },
        {
            num: 31,
            text: "Two cars A and B each of mass $10^{3}$ kg are moving on parallel tracks separated by a distance of 10 m, in same direction with speeds 72 km/h and 36 km/h. The magnitude of angular momentum of car A with respect to car B is",
            options: [
                "(1) $3.6\\times10^{5}$",
                "(2) $10^{5}$",
                "(3) $3\\times10^{5}$",
                "(4) $2\\times10^{5}$"
            ]
        },
        {
            num: 33,
            text: "The kinetic energy of a simple harmonic oscillator is oscillating with angular frequency of 176 rad/s. The frequency of this simple harmonic oscillator is ____ Hz. [take $\\pi=\\frac{22}{7}$]",
            options: [
                "(1) 14",
                "(2) 88",
                "(3) 28",
                "(4) 176"
            ]
        },
        {
            num: 34,
            text: "Given below are two statements:<br>Statement I: In a Young's double slit experiment, the angular separation of fringes will increase as the screen is moved away from the plane of the slits.<br>Statement II: In a Young's double slit experiment, the angular separation of fringes will increase when monochromatic source is replaced by another monochromatic source of higher wavelength.",
            options: [
                "(1) Both Statement I and Statement II are true",
                "(2) Both Statement I and Statement II are false",
                "(3) Statement I is false but Statement II is true",
                "(4) Statement I is true but Statement II is false"
            ]
        },
        {
            num: 35,
            text: "A battery with EMF E and internal resistance r is connected across a resistance R. The power consumption in R will be maximum when :",
            options: [
                "(1) $R=2r$",
                "(2) $R=\\frac{r}{2}$",
                "(3) $R=\\sqrt{2}r$",
                "(4) $R=r$"
            ]
        },
        {
            num: 36,
            text: "Keeping the significant figures in view, the sum of the physical quantities 52.01m, 153.2 m and 0.123 m is:",
            options: [
                "(1) 205 m",
                "(2) 205.333 m",
                "(3) 205.33 m",
                "(4) 205.3 m"
            ]
        },
        {
            num: 38,
            text: "Surface tension of two liquids (having same densities), $T_{1}$ and $T_{2}$, are measured using capillary rise method utilizing two tubes with inner radii of $r_{1}$ and $r_{2}$ where $r_{1}>r_{2}$. The measured liquid heights in these tubes are $h_{1}$ and $h_{2}$ respectively. [Ignore the weight of the liquid about the lowest point of miniscus]. The heights $h_{1}$ and $h_{2}$ and surface tensions $T_{1}$ and $T_{2}$ satisfy the relation:",
            options: [
                "(1) $h_{1}<h_{2}$ and $T_{1}=T_{2}$",
                "(2) $h_{1}=h_{2}$ and $T_{1}=T_{2}$",
                "(3) $h_{1}>h_{2}$ and $T_{1}=T_{2}$",
                "(4) $h_{1}>h_{2}$ and $T_{1}<T_{2}$"
            ]
        },
        {
            num: 39,
            text: "A river of width 200 m is flowing from west to east with a speed of 18 km/h. A boat, moving with speed of 36 km/h in still water, is made to travel one-round trip (bank to bank of the river). Minimum time taken by the boat for this journey and also the displacement along the river bank are respectively:",
            options: [
                "(1) 20 s and 100 m",
                "(2) 40 s and 0 m",
                "(3) 40 s and 200 m",
                "(4) 40 s and 100 m"
            ]
        },
        {
            num: 40,
            text: "Two known resistance of R $\\Omega$ and 2R $\\Omega$ and one unknown resistance X $\\Omega$ are connected in a circuit as shown in the figure. If the equivalent resistance between points A and B in the circuit is X $\\Omega$, then the value of X is",
            options: [
                "(1) $(\\sqrt{3}-1)R$",
                "(2) R",
                "(3) $2(\\sqrt{3}-1)R$",
                "(4) $(\\sqrt{3}+1)R$"
            ]
        },
        {
            num: 41,
            text: "The energy of an electron in an orbit of the Bohr's atom is $-0.04E_{0}~eV$ where $E_{0}$ is the ground state energy. If L is the angular momentum of the electron in this orbit and h is the Planck's constant, then $\\frac{2\\pi L}{h}$ is",
            options: [
                "(1) 2",
                "(2) 4",
                "(3) 5",
                "(4) 6"
            ]
        },
        {
            num: 43,
            text: "A large drum having radius R is spinning around its axis with angular velocity $\\omega$, as shown in figure. The minimum value of $\\omega$ so that a body of mass M remains stuck to the inner wall of the drum, taking the coefficient of friction between the drum surface and mass M is $\\mu$, is :",
            options: [
                "(1) $\\sqrt{\\frac{\\mu g}{R}}$",
                "(2) $\\sqrt{\\frac{2g}{\\mu R}}$",
                "(3) $\\sqrt{\\frac{g}{2\\mu R}}$",
                "(4) $\\sqrt{\\frac{g}{\\mu R}}$"
            ]
        },
        {
            num: 44,
            text: "A body of mass 2 kg is moving along x-direction such that its displacement as function of time is given by $x(t)=\\alpha t^{2}+\\beta t+\\gamma~m,$ where $\\alpha=1~m/s^{2}$, $\\beta=1~m/s$ and $\\gamma=1m$. The work done on the body during the time interval $t=2$ s to $t=3$ s, is ____ J.",
            options: [
                "(1) 49",
                "(2) 42",
                "(3) 24",
                "(4) 12"
            ]
        },
        {
            num: 45,
            text: "As shown in the diagram, when the incident ray is parallel to base of the prism, the emergent ray grazes along the second surface. If refractive index of the material of prism is $\\sqrt{2}$, the angle $\\theta$ of prism is:",
            options: [
                "(1) 60°",
                "(2) 75°",
                "(3) 90°",
                "(4) 45°"
            ]
        },
        {
            num: 46,
            text: "An electromagnetic wave of frequency 100 MHz propagates through a medium of conductivity, $\\sigma=10~mho/m.$ The ratio of maximum conducting current density to maximum displacement current density is [$Take~\\frac{1}{4\\pi\\epsilon_{0}}=9\\times10^{9}Nm^{2}/C^{2}$]",
            options: [
                "Numerical Answer Required"
            ]
        },
        {
            num: 47,
            text: "The terminal velocity of a metallic ball of radius 6 mm in a viscous fluid is 20 cm/s. The terminal velocity of another ball of same material and having radius 3 mm in the same fluid will be ____ cm/s.",
            options: [
                "Numerical Answer Required"
            ]
        },
        {
            num: 48,
            text: "A particle having electric charge $3\\times10^{-19}C$ and mass $6\\times10^{-27}$ kg is accelerated by applying an electric potential of 1.21 V. Wavelength of the matter wave associated with the particle is $\\alpha\\times10^{-12}$ m. The value of $\\alpha$ is (Take Planck's constant $=6.6\\times10^{-34}J.s)$",
            options: [
                "Numerical Answer Required"
            ]
        },
        {
            num: 50,
            text: "A diatomic gas $(\\gamma=1.4)$ does 100 J of work when it is expanded isobarically. Then the heat given to the gas ____ J.",
            options: [
                "Numerical Answer Required"
            ]
        }
    ];

    let currentSlide = 0;

    function renderSlide() {
        const q = questions[currentSlide];
        const panel = document.getElementById('question-panel');
        const indexDisplay = document.getElementById('slide-index');
        
        indexDisplay.innerText = `Slide ${currentSlide + 1} / ${questions.length} (Q. ${q.num})`;
        
        let html = `
            <div class="mb-4 text-blue-800 font-bold text-lg">Question ${q.num}</div>
            <div class="text-xl leading-relaxed mb-6 text-gray-800">
                ${q.text}
            </div>
            <div class="mt-8 space-y-3">
        `;

        q.options.forEach(opt => {
            html += `<div class="option text-lg">${opt}</div>`;
        });
        
        html += `</div>`;
        panel.innerHTML = html;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function nextSlide() {
        if (currentSlide < questions.length - 1) {
            currentSlide++;
            renderSlide();
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowRight") nextSlide();
        if (e.key === "ArrowLeft") prevSlide();
    });

    window.onload = renderSlide;
</script>

</body>
</html>
