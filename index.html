<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software & Mobile Apps Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
        }

        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-content ul {
            list-style-type: none;
            padding-left: 0;
        }

        .slide-content li {
            margin-bottom: 1rem;
            position: relative;
            padding-left: 2rem;
            font-size: 1.125rem;
            color: #334155;
            line-height: 1.6;
        }

        .slide-content li::before {
            content: '\f0da';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            color: #3b82f6;
            font-size: 1.25rem;
        }

        .option-btn {
            transition: all 0.2s ease;
        }
        
        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .option-correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }

        .option-incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        /* Scrollbar styling for content overflow */
        .content-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .content-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .content-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .content-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-8">

    <!-- Main Container -->

                content: `
                    <p class="text-lg text-gray-600 mb-6">Software is governed by licenses that dictate how it can be used, modified, and distributed. The two primary paradigms are Open-Source and Proprietary.</p>

                            <li><strong>Transparency:</strong> Code is visible to the public, allowing peers to audit for security and bugs.</li>

                title: "Pros & Cons of Open-Source",

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                                <ul>
                                    <li>Highly cost-effective (free).</li>
                                    <li>Flexibility and freedom from vendor lock-in.</li>

                                    <li>Compatibility issues with proprietary hardware/software.</li>
                                </ul>
                            </div>
                        </div>

                `
            },
            {
                title: "Deep Dive: Proprietary Software",

                    <div class="slide-content mt-6">
                        <ul>
                            <li><strong>Ownership:</strong> Licensed, not sold. You buy the right to use it, not the code itself.</li>
                            <li><strong>Support:</strong> Usually comes with dedicated, professional customer service and service level agreements (SLAs).</li>
                            <li><strong>User Experience:</strong> Often highly polished, user-friendly, and extensively tested by the owning company.</li>
                            <li><strong>Examples:</strong> Microsoft Windows, Microsoft Office, Adobe Photoshop, macOS.</li>
                        </ul>
                    </div>
                `
            },
            {
                title: "Pros & Cons of Proprietary Software",
                content: `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-xl font-bold text-green-600 mb-4 border-b pb-2"><i class="fas fa-plus-circle mr-2"></i> Advantages</h3>

                                <ul>
                                    <li>Polished, intuitive User Interfaces (UI).</li>

                            <div class="slide-content">

                                    <li>High licensing fees and subscription costs.</li>
                                    <li>Zero customization of the core product.</li>
                                    <li>Vendor lock-in: Difficult to migrate away once fully integrated.</li>
                                    <li>Security relies entirely on the vendor finding and patching flaws.</li>
                                </ul>
                            </div>
                        </div>

            {

                content: `
                    <div class="text-center mt-4 mb-8">

                    </div>
                    <p class="text-lg text-gray-600 text-center max-w-3xl mx-auto mb-6">While underlying software licenses dictate how code is managed, the <strong>platform</strong> dictates how software is delivered. Today, the most dominant platform for software delivery is the Mobile Application.</p>
                    <div class="bg-indigo-50 p-6 rounded-xl border border-indigo-100 text-center">
                        <p class="text-indigo-800 font-medium">A Mobile Application (App) is a type of application software designed to run on a mobile device, such as a smartphone or tablet computer.</p>

            {
                title: "Types of Mobile Applications",
                content: `

                            <h3 class="text-lg font-bold text-gray-800 mb-2">Hybrid Apps</h3>
                            <p class="text-sm text-gray-600 mb-2">Web apps wrapped in a native shell. Cross-platform framework (like React Native). Write once, run anywhere.</p>
                            <p class="text-xs font-semibold text-purple-500">Cost Effective</p>
                        </div>

            {

                    <div class="slide-content mt-6">
                        <ul>
                            <li><strong>Communication:</strong> Instant messaging, video conferencing, and unified communications (e.g., Slack, Microsoft Teams, Zoom).</li>
                            <li><strong>Document Management:</strong> Accessing, editing, and sharing documents on the go via cloud storage (e.g., Google Drive, OneDrive).</li>

                            <li><strong>Enterprise Resource Planning (ERP):</strong> Approving invoices, checking inventory, and HR functions directly from a phone.</li>

                    </div>

            {
                title: "Key Benefits of Mobile Office Automation",

                            <div class="bg-blue-100 p-3 rounded-full text-blue-600 mr-4"><i class="fas fa-globe"></i></div>
                            <div>
                                <h4 class="font-bold text-gray-800">Remote Work Enablement</h4>
                                <p class="text-gray-600 text-sm">Employees are no longer tethered to a physical desk, enabling global, flexible workforces.</p>
                            </div>
                        </div>
                        <div class="flex items-start p-4 bg-white rounded-lg shadow-sm border border-gray-100">
                            <div class="bg-green-100 p-3 rounded-full text-green-600 mr-4"><i class="fas fa-bolt"></i></div>
                            <div>
                                <h4 class="font-bold text-gray-800">Increased Productivity</h4>
                                <p class="text-gray-600 text-sm">Approvals, emails, and quick tasks can be handled during commutes or downtime.</p>

                    </div>

                content: `
                    <p class="text-lg text-gray-600 mb-6">Beyond the office, mobile applications have fundamentally re-engineered how humans navigate their daily personal lives.</p>

            { q: "Trello and Asana mobile apps are primarily used for:", options: ["Video conferencing", "Task and project management", "Graphic design", "Network security"], ans: 1 },
            { q: "Mobile apps have replaced physical office hardware. For example, apps like CamScanner act as portable:", options: ["Printers", "Fax machines", "Scanners", "Projectors"], ans: 2 },
            { q: "One major impact of mobile office automation is:", options: ["Decreased employee communication", "The enablement of remote and flexible workforces", "Higher costs for physical office supplies", "Forcing everyone to work 9-to-5 exclusively"], ans: 1 },
            { q: "ERP stands for Enterprise Resource Planning. Mobile ERP apps allow managers to:", options: ["Play games during meetings", "Approve invoices and check inventory from their phones", "Write source code for the company website", "Design company logos"], ans: 1 },
            
            { q: "Google Maps and Waze fall under which daily life app category?", options: ["Fintech", "E-commerce", "Navigation", "Health & Fitness"], ans: 2 },
            { q: "Amazon and UberEats are examples of:", options: ["Educational Apps", "E-commerce & Delivery Apps", "Social Media Apps", "Productivity Apps"], ans: 1 },
            { q: "MyFitnessPal is an application designed to help users with:", options: ["Tracking health, diet, and fitness", "Managing bank accounts", "Booking flights", "Learning new languages"], ans: 0 },
            { q: "What is a primary function of Fintech/Banking mobile apps in daily life?", options: ["Tracking heart rate", "Sending money and managing finances instantly", "Editing photographs", "Navigating traffic"], ans: 1 },
            { q: "WhatsApp and Instagram are primarily categorized as:", options: ["Office Automation tools", "Social and Media communication apps", "Open-source operating systems", "Document management systems"], ans: 1 },
            { q: "Apps like Duolingo or Coursera demonstrate the use of mobile technology in:", options: ["Education and Learning", "Logistics", "Manufacturing", "Healthcare diagnostics"], ans: 0 },
            { q: "Overall, the transition to mobile apps in daily life has led to:", options: ["Slower access to information", "Decreased global communication", "On-demand access to services, information, and communication 24/7", "The obsolescence of the internet"], ans: 2 }
        ];

        // ==================== STATE VARIABLES ====================
        let currentSlide = 0;
        let currentQuestion = 0;
        let score = 0;
        let isQuizActive = false;
        let optionSelectedForCurrentQ = false;

        // ==================== DOM ELEMENTS ====================
        const presentationView = document.getElementById('presentation-view');
        const quizView = document.getElementById('quiz-view');
        const resultsView = document.getElementById('results-view');
        
        const slideContainer = document.getElementById('slide-container');
        const slideProgress = document.getElementById('slide-progress');
        const currentSlideNum = document.getElementById('current-slide-num');
        const totalSlidesNum = document.getElementById('total-slides-num');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        const quizProgress = document.getElementById('quiz-progress');
        const currentQNum = document.getElementById('current-q-num');
        const totalQNum = document.getElementById('total-q-num');
        const currentScoreEl = document.getElementById('current-score');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextQBtn = document.getElementById('next-q-btn');

        // ==================== INITIALIZATION ====================
        function init() {
            totalSlidesNum.innerText = slidesData.length;
            totalQNum.innerText = quizData.length;
            renderSlide();
        }

        // ==================== PRESENTATION LOGIC ====================
        function renderSlide() {
            const slide = slidesData[currentSlide];
            
            // Animate content
            slideContainer.classList.remove('fade-enter-active');
            
            setTimeout(() => {
                let html = `<h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">${slide.title}</h1>`;
                if (slide.subtitle) {
                    html += `<p class="text-xl text-gray-500 mb-8">${slide.subtitle}</p>`;
                } else {
                    html += `<div class="h-1 w-20 bg-blue-500 rounded my-6"></div>`;
                }
                html += `<div>${slide.content}</div>`;
                
                slideContainer.innerHTML = html;
                
                // Add animation class
                slideContainer.classList.add('fade-enter');
                setTimeout(() => slideContainer.classList.add('fade-enter-active'), 50);
            }, 150); // slight delay for fade out

            // Update UI elements
            currentSlideNum.innerText = currentSlide + 1;
            slideProgress.style.width = `${((currentSlide + 1) / slidesData.length) * 100}%`;
            
            // Button states
            prevBtn.disabled = currentSlide === 0;
            
            if (currentSlide === slidesData.length - 1) {
                nextBtn.innerHTML = `Start Quiz <i class="fas fa-play ml-2"></i>`;
                nextBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                nextBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            } else {
                nextBtn.innerHTML = `Next <i class="fas fa-arrow-right ml-2"></i>`;
                nextBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                nextBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
            }
        }

        function nextSlide() {
            if (currentSlide === slidesData.length - 1) {
                startQuiz();
            } else {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        // ==================== QUIZ LOGIC ====================
        function startQuiz() {
            presentationView.classList.add('hidden');
            quizView.classList.remove('hidden');
            isQuizActive = true;
            renderQuestion();
        }

        function renderQuestion() {
            optionSelectedForCurrentQ = false;
            nextQBtn.classList.add('hidden');
            
            const qData = quizData[currentQuestion];
            questionText.innerText = qData.q;
            
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 sm:p-5 rounded-xl border-2 border-gray-200 bg-white text-gray-700 font-medium text-lg flex items-center';
                
                // Add letter (A, B, C, D)
                const letter = String.fromCharCode(65 + index);
                btn.innerHTML = `<span class="inline-flex items-center justify-center w-8 h-8 rounded bg-gray-100 text-gray-600 font-bold mr-4 text-sm">${letter}</span> ${opt}`;
                
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });

            currentQNum.innerText = currentQuestion + 1;
            quizProgress.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            currentScoreEl.innerText = score;
        }

        function selectOption(selectedIndex, selectedBtn) {
            if (optionSelectedForCurrentQ) return; // Prevent multiple selections
            optionSelectedForCurrentQ = true;
            
            const qData = quizData[currentQuestion];
            const buttons = optionsContainer.querySelectorAll('button');
            
            // Disable all buttons
            buttons.forEach(btn => btn.disabled = true);
            
            // Check answer
            if (selectedIndex === qData.ans) {
                // Correct
                selectedBtn.classList.add('option-correct');
                selectedBtn.innerHTML += `<i class="fas fa-check-circle ml-auto text-xl"></i>`;
                score++;
                currentScoreEl.innerText = score;
            } else {
                // Incorrect
                selectedBtn.classList.add('option-incorrect');
                selectedBtn.innerHTML += `<i class="fas fa-times-circle ml-auto text-xl"></i>`;
                
                // Highlight correct answer
                const correctBtn = buttons[qData.ans];
                correctBtn.classList.add('option-correct');
                correctBtn.innerHTML += `<i class="fas fa-check-circle ml-auto text-xl"></i>`;
            }

            // Show next button
            nextQBtn.classList.remove('hidden');
            
            // Change next button text on last question
            if (currentQuestion === quizData.length - 1) {
                nextQBtn.innerHTML = `See Results <i class="fas fa-flag-checkered ml-2"></i>`;
            }
        }

        function nextQuestion() {
            if (currentQuestion === quizData.length - 1) {
                showResults();
            } else {
                currentQuestion++;
                renderQuestion();
            }
        }

        function showResults() {
            quizView.classList.add('hidden');
            resultsView.classList.remove('hidden');
            
            document.getElementById('final-score-text').innerText = `${score}/${quizData.length}`;
            
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('score-percentage').innerText = `${percentage}%`;
            
            let feedback = "";
            if (percentage >= 90) feedback = "Excellent! You have a strong grasp of software and mobile tech concepts. 🌟";
            else if (percentage >= 70) feedback = "Great job! You understand the core basics well. 👍";
            else if (percentage >= 50) feedback = "Good effort, but you might want to review the presentation again. 📚";
            else feedback = "Keep learning! Restart the presentation to refresh your knowledge. 💡";
            
            document.getElementById('feedback-message').innerText = feedback;
        }

        function restartApp() {
            currentSlide = 0;
            currentQuestion = 0;
            score = 0;
            isQuizActive = false;
            
            resultsView.classList.add('hidden');
            presentationView.classList.remove('hidden');
            
            init();
        }

        // Run on load
        window.onload = init;

    </script>
</body>
</html>
