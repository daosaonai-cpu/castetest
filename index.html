<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Libraries MCQ Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .options-list {
            list-style-type: none;
            padding: 0;
        }
        .options-list li {
            margin-bottom: 8px;
        }
        label {
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background: #2980b9;
        }
        #result {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            color: #27ae60;
        }
        .correct {
            color: #27ae60;
            font-weight: bold;
        }
        .incorrect {
            color: #c0392b;
            font-weight: bold;
        }
        .feedback {
            display: block;
            margin-top: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Python Libraries MCQ Quiz</h1>
    <div id="quiz-container"></div>
    <button class="btn-submit" onclick="calculateScore()">Submit Answers</button>
    <div id="result"></div>
</div>

<script>
    // The extracted questions and their correct answers
    const quizData = [
        {
            question: "1. Which function is used to fill NA/NaN values?",
            options: ["fillna()", "replace()", "dropna()", "isna()"],
            answer: "fillna()"
        },
        {
            question: "2. What is a 2D array in NumPy?",
            options: ["String matrix", "Table of zeros", "Matrix of values", "Loop"],
            answer: "Matrix of values"
        },
        {
            question: "3. What is Pandas used for?",
            options: ["File I/O", "GUI", "Data analysis", "Web hosting"],
            answer: "Data analysis"
        },
        {
            question: "4. What does df.isnull() return?",
            options: ["Boolean DataFrame", "Null values", "Non-null values", "Row index"],
            answer: "Boolean DataFrame"
        },
        {
            question: "5. What does df.head() do in Pandas?",
            options: ["Removes headers", "Returns first rows", "Sorts data", "Deletes rows"],
            answer: "Returns first rows"
        },
        {
            question: "6. df[df['Age'] > 25] is used for...?",
            options: ["Deleting", "Adding", "Filtering", "Grouping"],
            answer: "Filtering"
        },
        {
            question: "7. Which library is used for numerical computations?",
            options: ["TensorFlow", "NumPy", "Django", "Matplotlib"],
            answer: "NumPy"
        },
        {
            question: "8. Which Python library is used to save models?",
            options: ["matplotlib", "joblib", "sklearn", "keras"],
            answer: "joblib"
        },
        {
            question: "9. Which library in Python is most commonly used for basic image processing tasks like reading and manipulation?",
            options: ["Pandas", "NumPy", "OpenCV", "TensorFlow"],
            answer: "OpenCV"
        },
        {
            question: "10. What is the use of plt.scatter()?",
            options: ["Bar chart", "Histogram", "Pie chart", "Scatter plot"],
            answer: "Scatter plot"
        }
    ];

    const quizContainer = document.getElementById("quiz-container");

    // Render the questions
    function buildQuiz() {
        quizData.forEach((item, index) => {
            const questionBlock = document.createElement("div");
            questionBlock.classList.add("question-block");
            questionBlock.id = `q-block-${index}`;

            const questionTitle = document.createElement("div");
            questionTitle.classList.add("question-title");
            questionTitle.innerText = item.question;
            questionBlock.appendChild(questionTitle);

            const optionsList = document.createElement("ul");
            optionsList.classList.add("options-list");

            item.options.forEach(option => {
                const li = document.createElement("li");
                const label = document.createElement("label");
                
                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = `question${index}`;
                radio.value = option;

                label.appendChild(radio);
                label.appendChild(document.createTextNode(option));
                li.appendChild(label);
                optionsList.appendChild(li);
            });

            const feedback = document.createElement("div");
            feedback.id = `feedback-${index}`;
            feedback.classList.add("feedback");

            questionBlock.appendChild(optionsList);
            questionBlock.appendChild(feedback);
            quizContainer.appendChild(questionBlock);
        });
    }

    // Calculate score and show correct/incorrect feedback
    function calculateScore() {
        let score = 0;

        quizData.forEach((item, index) => {
            const selectedOption = document.querySelector(`input[name="question${index}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${index}`);

            if (selectedOption) {
                if (selectedOption.value === item.answer) {
                    score++;
                    feedbackEl.innerHTML = `<span class="correct">✔ Correct!</span>`;
                } else {
                    feedbackEl.innerHTML = `<span class="incorrect">✘ Incorrect. The correct answer is: ${item.answer}</span>`;
                }
            } else {
                feedbackEl.innerHTML = `<span class="incorrect">⚠ You didn't select an answer. The correct answer is: ${item.answer}</span>`;
            }
            
            // Disable inputs after submission
            const allRadios = document.querySelectorAll(`input[name="question${index}"]`);
            allRadios.forEach(radio => radio.disabled = true);
        });

        const resultContainer = document.getElementById("result");
        resultContainer.innerText = `You scored ${score} out of ${quizData.length}!`;
        
        // Disable the submit button
        document.querySelector(".btn-submit").disabled = true;
        document.querySelector(".btn-submit").style.background = "#bdc3c7";
        document.querySelector(".btn-submit").innerText = "Quiz Completed";
        window.scrollTo(0, document.body.scrollHeight);
    }

    // Initialize the app
    buildQuiz();
</script>

</body>
</html>
