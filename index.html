<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie Vibes Cam</title>
    <style>
        :root {
            --bg-color: #111;
            --text-color: #f0f0f0;
            --accent: #ff4757;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: lowercase;
            opacity: 0.8;
        }

        .cam-container {
            position: relative;
            border: 2px solid #333;
            padding: 10px;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* The actual canvas where the magic happens */
        canvas {
            width: 100%;
            max-width: 800px;
            background-color: #222;
            display: block;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background: var(--text-color);
            color: var(--bg-color);
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        #recordBtn.recording {
            color: var(--accent);
            border-color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        #recordBtn.recording:hover {
            background: var(--accent);
            color: #fff;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* A subtle CRT scanline overlay effect for the app background */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>// rec. vibes</h1>

    <div class="cam-container">
        <video id="rawVideo" autoplay muted playsinline style="display:none;"></video>
        <canvas id="filterCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="recordBtn">Start Recording</button>
        <button id="switchBtn">Switch Camera</button>
    </div>

    <script>
        const video = document.getElementById('rawVideo');
        const canvas = document.getElementById('filterCanvas');
        const ctx = canvas.getContext('2d');
        const recordBtn = document.getElementById('recordBtn');
        const switchBtn = document.getElementById('switchBtn');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let rawStream;
        let currentFacingMode = 'user'; // Start with the front camera

        // Initialize Webcam
        async function initCamera() {
            // Stop any existing tracks before switching cameras
            if (rawStream) {
                rawStream.getTracks().forEach(track => track.stop());
            }

            try {
                const constraints = {
                    video: { facingMode: currentFacingMode },
                    audio: true
                };
                
                rawStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = rawStream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    // Only start the loop if it's not already running
                    if (!video.dataset.looping) {
                        video.dataset.looping = true;
                        requestAnimationFrame(drawFilteredFrame);
                    }
                };
            } catch (err) {
                alert("Could not access camera. Make sure you are on HTTPS or localhost, and allowed permissions.");
                console.error(err);
            }
        }

        // The Aesthetic Filter Loop
        function drawFilteredFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 1. Apply the low-fi indie filter
                ctx.filter = 'sepia(40%) contrast(130%) saturate(80%) brightness(95%) blur(0.5px)';
                
                // If using the front camera, mirror the image horizontally so it acts like a mirror
                if (currentFacingMode === 'user') {
                    ctx.save();
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    ctx.restore();
                } else {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }

                // 2. Reset filter so our text stays crisp
                ctx.filter = 'none';

                // 3. Add a retro glowing timestamp
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = '24px "Courier New"';
                ctx.shadowColor = "rgba(255,255,255,0.5)";
                ctx.shadowBlur = 4;
                
                const now = new Date();
                const dateString = now.toLocaleDateString().replace(/\//g, '.');
                const timeString = now.toLocaleTimeString();
                
                // Draw blinking "REC" if recording
                if (isRecording && Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = '#ff4757';
                    ctx.fillText('• REC', 30, 40);
                }
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillText(`${dateString} ${timeString}`, 30, canvas.height - 30);
                ctx.shadowBlur = 0; // reset shadow
            }
            
            // Loop this function for every frame
            requestAnimationFrame(drawFilteredFrame);
        }

        // Setup Recording Logic
        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            recordedChunks = [];
            
            // Capture the filtered visual stream from the canvas
            const canvasStream = canvas.captureStream(30); // 30 fps
            
            // Grab the audio track from the raw webcam stream
            const audioTracks = rawStream.getAudioTracks();
            if (audioTracks.length > 0) {
                canvasStream.addTrack(audioTracks[0]);
            }

            // Create media recorder
            mediaRecorder = new MediaRecorder(canvasStream, {
                mimeType: 'video/webm; codecs=vp9'
            });

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                // Create a downloadable file
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `indie-tape-${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.textContent = "Stop Recording";
            recordBtn.classList.add("recording");
            
            // Disable switching cameras while recording to prevent crashes
            switchBtn.disabled = true;
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.textContent = "Start Recording";
            recordBtn.classList.remove("recording");
            
            // Re-enable camera switching
            switchBtn.disabled = false;
        }

        // Toggle camera mode
        function switchCamera() {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera();
        }

        recordBtn.addEventListener('click', toggleRecording);
        switchBtn.addEventListener('click', switchCamera);

        // Boot it up
        initCamera();
    </script>
</body>
</html>
